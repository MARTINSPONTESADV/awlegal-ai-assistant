/* Algoritmo LCS caractere-a-caractere — marca quais são "iguais ao original"
   e quais são "adicionados pelo usuário". Retorna array de {char, novo:bool}. */
function diffChars(original, atual) {
  const a = original || '';
  const b = atual || '';
  const m = a.length, n = b.length;

  // Otimização: se prefixo é igual, pula
  let inicio = 0;
  while (inicio < m && inicio < n && a[inicio] === b[inicio]) inicio++;
  // Otimização: se sufixo é igual, pula
  let fimA = m, fimB = n;
  while (fimA > inicio && fimB > inicio && a[fimA - 1] === b[fimB - 1]) { fimA--; fimB--; }

  const resultado = [];
  // Parte inicial idêntica
  for (let i = 0; i < inicio; i++) resultado.push({ char: b[i], novo: false });

  // Miolo divergente — LCS só nessa parte
  const subA = a.slice(inicio, fimA);
  const subB = b.slice(inicio, fimB);
  const lcs = lcsTable(subA, subB);
  // Reconstrói marcando cada caractere de subB como "novo" ou não
  let i = subA.length, j = subB.length;
  const miolo = [];
  while (j > 0) {
    if (i > 0 && subA[i - 1] === subB[j - 1]) {
      miolo.unshift({ char: subB[j - 1], novo: false });
      i--; j--;
    } else if (i === 0 || (j > 0 && (i === 0 || lcs[i][j - 1] >= lcs[i - 1][j]))) {
      miolo.unshift({ char: subB[j - 1], novo: true });
      j--;
    } else {
      i--;
    }
  }
  resultado.push(...miolo);

  // Parte final idêntica
  for (let k = fimB; k < n; k++) resultado.push({ char: b[k], novo: false });

  return resultado;
}

function lcsTable(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, () => new Uint16Array(n + 1));
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      if (a[i - 1] === b[j - 1]) dp[i][j] = dp[i - 1][j - 1] + 1;
      else dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
    }
  }
  return dp;
}

/* Renderiza o conteúdo do trecho dentro do contenteditable com spans <user-edit>
   preservando a posição do cursor. */
function renderTrechoComDiff(el) {
  const tag = el.dataset.tag;
  const original = state.trechosIAOriginais[tag] || '';
  const atual = state.trechosIA[tag] || '';
  if (!atual) {
    el.innerHTML = '';
    return;
  }
  if (atual === original) {
    // Sem edição — texto puro, sem spans
    el.textContent = atual;
    return;
  }
  const diff = diffChars(original, atual);
  // Agrupa runs de chars do mesmo tipo (novos x antigos) pra diminuir spans
  let html = '';
  let bufNovo = '', bufVelho = '';
  const flush = () => {
    if (bufVelho) { html += escapeHtml(bufVelho); bufVelho = ''; }
    if (bufNovo)  { html += `<span class="user-edit">${escapeHtml(bufNovo)}</span>`; bufNovo = ''; }
  };
  for (const { char, novo } of diff) {
    if (novo) {
      if (bufVelho) flush();
      bufNovo += char;
    } else {
      if (bufNovo) flush();
      bufVelho += char;
    }
  }
  flush();
  el.innerHTML = html;
}

/* O re-render que preserva o cursor — rodado com pequeno delay após input */
let _reRenderTimer = null;
let _reRenderTarget = null;
function agendarReRenderDiff(el) {
  _reRenderTarget = el;
  if (_reRenderTimer) clearTimeout(_reRenderTimer);
  _reRenderTimer = setTimeout(() => {
    executarReRenderDiff();
  }, 180); // debounce pra não re-renderizar a cada tecla
}
function executarReRenderDiff() {
  const el = _reRenderTarget;
  if (!el || !el.isConnected) return;
  // Salva posição do cursor como offset absoluto dentro do texto
  const sel = window.getSelection();
  let caretOffset = 0;
  if (sel && sel.rangeCount > 0) {
    const range = sel.getRangeAt(0);
    if (el.contains(range.endContainer)) {
      const preRange = range.cloneRange();
      preRange.selectNodeContents(el);
      preRange.setEnd(range.endContainer, range.endOffset);
      caretOffset = preRange.toString().length;
    }
  }
  renderTrechoComDiff(el);
  // Restaura cursor no offset correto
  restaurarCursor(el, caretOffset);
}

function restaurarCursor(el, offset) {
  const sel = window.getSelection();
  if (!sel) return;
  const range = document.createRange();
  let contador = 0;
  let achou = false;
  const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null);
  let node;
  while ((node = walker.nextNode())) {
    const len = node.textContent.length;
    if (contador + len >= offset) {
      range.setStart(node, offset - contador);
      range.collapse(true);
      achou = true;
      break;
    }
    contador += len;
  }
  if (!achou) {
    // fallback: final
    range.selectNodeContents(el);
    range.collapse(false);
  }
  sel.removeAllRanges();
  sel.addRange(range);
}

function contarPalavras(s) {
  return (s.trim().match(/\S+/g) || []).length;
}

/**
 * Abre/fecha o campo de sugestão de regeneração de uma zona.
 */
function toggleSugestaoZona(tag) {
  const bloco = document.querySelector(`.zone-sugestao[data-tag="${tag}"]`);
  if (!bloco) return;
  const aberto = bloco.style.display !== 'none';
  if (aberto) {
    bloco.style.display = 'none';
  } else {
    bloco.style.display = 'flex';
    // Foca no textarea automaticamente
    const ta = bloco.querySelector('.zone-sugestao-input');
    if (ta) setTimeout(() => ta.focus(), 50);
  }
}

/**
 * Regenera uma zona usando a sugestão digitada pelo usuário.
 * Se o textarea estiver vazio, cai pra regeneração pura (sem sugestão).
 */
async function regenerarZonaComSugestao(tag) {
  const bloco = document.querySelector(`.zone-sugestao[data-tag="${tag}"]`);
  const ta = bloco ? bloco.querySelector('.zone-sugestao-input') : null;
  const sugestao = ta ? ta.value.trim() : '';

  if (!sugestao) {
    // Campo vazio — só regenera sem sugestão
    await regenerarZona(tag);
    if (bloco) bloco.style.display = 'none';
    return;
  }

  // Regenera passando a sugestão no payload e limpa o campo depois
  await regenerarZona(tag, sugestao);
  if (ta) ta.value = '';
  if (bloco) bloco.style.display = 'none';
}

async function regenerarZona(tag, sugestaoUsuario) {
  const card = document.querySelector(`.zone-card[data-tag="${tag}"]`);
  const editor = card.querySelector('.zone-text');
  editor.classList.add('generating');
  editor.textContent = sugestaoUsuario
    ? 'Gerando nova versão com sua sugestão...'
    : 'Gerando nova versão...';
  editor.setAttribute('contenteditable', 'false');

  try {
    if (state.config.webhookTrechos) {
      // Payload inclui sugestao_usuario quando foi passada — o n8n usa isso
      // pra enriquecer o prompt daquela zona específica.
      const payloadBase = montarPayloadGeracao();
      const payload = {
        ...payloadBase,
        zonas: [tag],
        sugestao_usuario: sugestaoUsuario || null,
      };
      const resp = await fetch(state.config.webhookTrechos, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const json = await resp.json();
      const novo = json.trechos[tag];
      state.trechosIA[tag] = novo;
      state.trechosIAOriginais[tag] = novo;
    } else {
      await new Promise(r => setTimeout(r, 1500));
      const mock = gerarTrechosMock();
      state.trechosIA[tag] = mock[tag];
      state.trechosIAOriginais[tag] = mock[tag];
    }
    state.trechosEditados.delete(tag);
    card.classList.remove('edited');
    const badge = card.querySelector('.zone-badge-edited');
    if (badge) badge.style.display = 'none';
    editor.classList.remove('generating');
    editor.setAttribute('contenteditable', 'true');
    renderTrechoComDiff(editor);
    const chars = card.querySelector('.zone-chars');
    if (chars) chars.textContent = `${state.trechosIA[tag].length} CARS · ${contarPalavras(state.trechosIA[tag])} PALAVRAS`;
  } catch (err) {
    editor.classList.remove('generating');
    editor.setAttribute('contenteditable', 'true');
    renderTrechoComDiff(editor);
    alert('Erro: ' + err.message);
  }
}

function restaurarOriginal(tag) {
  state.trechosIA[tag] = state.trechosIAOriginais[tag];
  state.trechosEditados.delete(tag);
  const card = document.querySelector(`.zone-card[data-tag="${tag}"]`);
  card.classList.remove('edited');
  const badge = card.querySelector('.zone-badge-edited');
  if (badge) badge.style.display = 'none';
  const editor = card.querySelector('.zone-text');
  renderTrechoComDiff(editor);
  const chars = card.querySelector('.zone-chars');
  if (chars) chars.textContent = `${state.trechosIA[tag].length} CARS · ${contarPalavras(state.trechosIA[tag])} PALAVRAS`;
}

async function gerarPecaFinal() {
  state.tela = 'gerando';
  // Promise que resolve quando a animação visual terminar de verdade
  const animacaoTerminou = rodarAnimacaoGeracao('peca');

  // Geração do .docx — agora TOTALMENTE no navegador (docxtemplater + image module).
  // O workflow 2 do n8n não é mais usado. Apenas o workflow 1 (gerar trechos) continua.
  const geracaoPromise = (async () => {
    try {
      const blob = await montarDocxNoNavegador();
      state.arquivoFinalBlob = blob;
    } catch (err) {
      console.error('Erro na geração:', err);
      throw err;
    }
  })();

  try {
    // Espera AMBOS: a animação chegar a 100% E a geração terminar
    await Promise.all([animacaoTerminou, geracaoPromise]);
    navegarPara('done');
  } catch (err) {
    alert('Erro ao gerar peça: ' + err.message);
    navegarPara('preview');
  }
}

/* =========================================================================
   GERAÇÃO DO .DOCX NO NAVEGADOR
   ========================================================================= */

/**
 * Monta o contexto com todas as tags do template a partir do state atual.
 * Retorna objeto { key: valor } pronto pra passar pro docxtemplater.
 */
function montarContextoDocx() {
  const c = state.dadosPacote1;
  const p3 = state.dadosPacote3;

  // Helpers de formatação
  const parseMoney = (s) => {
    if (!s) return 0;
    return parseFloat(String(s).replace(/\./g, '').replace(',', '.')) || 0;
  };
  const fmtMoney = (v) => v.toLocaleString('pt-BR', {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2,
  });

  const vDescontos = parseMoney(p3.valor_total_descontos);
  const vDanoMoral = parseMoney(p3.valor_dano_moral);
  const vDobro = vDescontos * 2;
  const vCausa = vDobro + vDanoMoral;

  return {
    // Cliente
    cliente_nome_completo:    c.nome_completo    || '',
    cliente_nacionalidade:    c.nacionalidade    || '',
    cliente_estado_civil:     c.estado_civil     || '',
    cliente_profissao:        c.profissao        || '',
    cliente_rg:               c.rg               || '',
    cliente_orgao_expedidor:  c.orgao_expedidor  || '',
    cliente_cpf:              c.cpf              || '',
    cliente_endereco_completo: c.endereco_completo || '',

    // Caso
    caso_numero_agencia:        p3.numero_agencia        || '',
    caso_numero_conta:          p3.numero_conta          || '',
    caso_data_inicio_descontos: p3.data_inicio_descontos || '',
    caso_data_fim_descontos:    p3.data_fim_descontos    || '',
    caso_valor_total_descontos: fmtMoney(vDescontos),
    caso_valor_dano_moral:      fmtMoney(vDanoMoral),
    caso_valor_dobro:           fmtMoney(vDobro),
    caso_valor_causa:           fmtMoney(vCausa),

    // Trechos IA
    ia_contexto_conta_salarial:  state.trechosIA.ia_contexto_conta_salarial  || '',
    ia_expropriacao_silenciosa:  state.trechosIA.ia_expropriacao_silenciosa  || '',
    ia_frase_minimo_existencial: state.trechosIA.ia_frase_minimo_existencial || '',
    ia_dano_moral_angustia:      state.trechosIA.ia_dano_moral_angustia      || '',
    ia_dano_moral_dignidade:     state.trechosIA.ia_dano_moral_dignidade     || '',
    ia_dano_moral_impotencia:    state.trechosIA.ia_dano_moral_impotencia    || '',

    // Flags de rubricas aplicáveis — controlam quais blocos condicionais
    // aparecem no template V9 ({#rubrica_cartao}, {#rubrica_parcela}, {#rubrica_bx})
    rubrica_cartao:     !!(state.rubricas && state.rubricas.cartao),
    rubrica_parcela:    !!(state.rubricas && state.rubricas.parcela),
    rubrica_bx:         !!(state.rubricas && state.rubricas.bx),
    multiplas_rubricas: contarRubricasMarcadas() > 1,
    caso_rubricas_texto: montarTextoRubricas(),
    // Letras dinâmicas pra enumeração a)/b)/c) no DOS FATOS. Só as rubricas
    // marcadas recebem letra; ordem fixa: cartão → parcela → BX.
    ...montarLetrasRubricas(),

    // Tag de imagem — o docxtemplater-image-module usa identifier string,
    // e o getImage() abaixo resolve pra um ArrayBuffer da imagem real.
    // NOTA: a tabela de descontos não vai aqui — é injetada diretamente no
    // document.xml após a renderização, via montarTabelaXmlDescontos().
    selfie: 'SELFIE',
  };
}

/**
 * Atribui letras (a, b, c) às rubricas marcadas, em ordem fixa:
 *   cartão → parcela → BX
 * Rubricas não marcadas recebem string vazia (mas como o bloco fica
 * escondido pela tag condicional, essa letra nem aparece).
 * Retorna objeto com as 3 chaves que o template espera.
 */
function montarLetrasRubricas() {
  const r = state.rubricas || {};
  const letras = ['a', 'b', 'c'];
  let idx = 0;
  const out = { letra_rubrica_cartao: '', letra_rubrica_parcela: '', letra_rubrica_bx: '' };
  if (r.cartao)  out.letra_rubrica_cartao  = letras[idx++];
  if (r.parcela) out.letra_rubrica_parcela = letras[idx++];
  if (r.bx)      out.letra_rubrica_bx      = letras[idx++];
  return out;
}

/**
 * Conta quantas rubricas estão marcadas em state.rubricas.
 */
function contarRubricasMarcadas() {
  const r = state.rubricas || {};
  return (r.cartao ? 1 : 0) + (r.parcela ? 1 : 0) + (r.bx ? 1 : 0);
}

/**
 * Monta o texto das rubricas marcadas com vírgulas e "e" antes da última.
 * Ex.: só BX → '"BX.ANT.FINANC"'
 *      BX + Parcela → '"PARCELA CRÉDITO PESSOAL" e "BX.ANT.FINANC"'
 *      todas → '"GASTOS CARTÃO DE CRÉDITO", "PARCELA CRÉDITO PESSOAL" e "BX.ANT.FINANC"'
 * Usado no pedido "e) declaração de inexigibilidade" do template.
 */
function montarTextoRubricas() {
  const r = state.rubricas || {};
  const nomes = [];
  if (r.cartao)  nomes.push('"GASTOS CARTÃO DE CRÉDITO"');
  if (r.parcela) nomes.push('"PARCELA CRÉDITO PESSOAL"');
  if (r.bx)      nomes.push('"BX.ANT.FINANC"');
  if (nomes.length === 0) return '';
  if (nomes.length === 1) return nomes[0];
  if (nomes.length === 2) return `${nomes[0]} e ${nomes[1]}`;
  return `${nomes.slice(0, -1).join(', ')} e ${nomes[nomes.length - 1]}`;
}

/**
 * Escapa texto pra XML (& < > " ').
 */
function escXml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&apos;');
}

/**
 * Monta o XML OOXML completo da tabela de descontos, fiel à planilha:
 * preserva subtítulos mesclados, cabeçalho, linhas de dados, e linhas de
 * VALOR TOTAL / VALOR EM DOBRO.
 *
 * Recebe o array `linhasClassificadas` produzido por processarTabelaXlsx.
 * Se for null/undefined, retorna um parágrafo único de aviso.
 */
function montarTabelaXmlDescontos(linhasClassificadas) {
  if (!Array.isArray(linhasClassificadas) || linhasClassificadas.length === 0) {
    // Tabela pulada ou ausente — parágrafo de aviso no lugar
    return `<w:p><w:pPr><w:jc w:val="center"/></w:pPr>` +
      `<w:r><w:rPr><w:i/><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/><w:sz w:val="20"/></w:rPr>` +
      `<w:t>Tabela de descontos a ser anexada posteriormente.</w:t></w:r></w:p>`;
  }

  // Larguras de coluna em DXA (1/20 pt). Total ~8800 DXA = ~15,5cm
  const colWidths = [1700, 2550, 2850, 1700];
  const totalWidth = colWidths.reduce((a, b) => a + b, 0);

  const cellBorders = `<w:tcBorders>` +
    `<w:top w:val="single" w:sz="6" w:space="0" w:color="000000"/>` +
    `<w:left w:val="single" w:sz="6" w:space="0" w:color="000000"/>` +
    `<w:bottom w:val="single" w:sz="6" w:space="0" w:color="000000"/>` +
    `<w:right w:val="single" w:sz="6" w:space="0" w:color="000000"/>` +
    `</w:tcBorders>`;

  let linhasXml = '';
  for (const l of linhasClassificadas) {
    if (l.tipo === 'cabecalho') {
      linhasXml += `<w:tr>` + ['Data', 'Descrição', 'Operação', 'Valor'].map((txt, i) => `
        <w:tc>
          <w:tcPr>
            <w:tcW w:w="${colWidths[i]}" w:type="dxa"/>
            ${cellBorders}
            <w:shd w:val="clear" w:color="auto" w:fill="D9D9D9"/>
            <w:vAlign w:val="center"/>
          </w:tcPr>
          <w:p>
            <w:pPr><w:jc w:val="center"/><w:spacing w:before="60" w:after="60"/></w:pPr>
            <w:r><w:rPr><w:b/><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/><w:sz w:val="20"/></w:rPr><w:t>${escXml(txt)}</w:t></w:r>
          </w:p>
        </w:tc>`).join('') + `</w:tr>`;
    } else if (l.tipo === 'subtitulo') {
      linhasXml += `<w:tr>
        <w:tc>
          <w:tcPr>
            <w:tcW w:w="${totalWidth}" w:type="dxa"/>
            <w:gridSpan w:val="4"/>
            ${cellBorders}
            <w:shd w:val="clear" w:color="auto" w:fill="BFBFBF"/>
            <w:vAlign w:val="center"/>
          </w:tcPr>
          <w:p>
            <w:pPr><w:jc w:val="center"/><w:spacing w:before="60" w:after="60"/></w:pPr>
            <w:r><w:rPr><w:b/><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/><w:sz w:val="20"/></w:rPr><w:t>${escXml(l.texto)}</w:t></w:r>
          </w:p>
        </w:tc>
      </w:tr>`;
    } else if (l.tipo === 'dado') {
      const valorFmt = isFinite(l.valor) ? `R$ ${formatarValorBR(l.valor)}` : '';
      const celulas = [
        { texto: l.data, align: 'center' },
        { texto: l.descricao, align: 'left' },
        { texto: l.operacao, align: 'left' },
        { texto: valorFmt, align: 'right' },
      ];
      linhasXml += `<w:tr>` + celulas.map((c, i) => `
        <w:tc>
          <w:tcPr>
            <w:tcW w:w="${colWidths[i]}" w:type="dxa"/>
            ${cellBorders}
            <w:vAlign w:val="center"/>
          </w:tcPr>
          <w:p>
            <w:pPr><w:jc w:val="${c.align}"/><w:spacing w:before="40" w:after="40"/></w:pPr>
            <w:r><w:rPr><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/><w:sz w:val="20"/></w:rPr><w:t xml:space="preserve">${escXml(c.texto)}</w:t></w:r>
          </w:p>
        </w:tc>`).join('') + `</w:tr>`;
    } else if (l.tipo === 'valor_total' || l.tipo === 'valor_dobro') {
      const label = l.tipo === 'valor_total' ? 'VALOR TOTAL' : 'VALOR EM DOBRO';
      const valorFmt = isFinite(l.valor) ? `R$ ${formatarValorBR(l.valor)}` : '';
      linhasXml += `<w:tr>
        <w:tc>
          <w:tcPr>
            <w:tcW w:w="${colWidths[0] + colWidths[1] + colWidths[2]}" w:type="dxa"/>
            <w:gridSpan w:val="3"/>
            ${cellBorders}
            <w:shd w:val="clear" w:color="auto" w:fill="FFFF99"/>
            <w:vAlign w:val="center"/>
          </w:tcPr>
          <w:p>
            <w:pPr><w:jc w:val="left"/><w:spacing w:before="40" w:after="40"/></w:pPr>
            <w:r><w:rPr><w:b/><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/><w:sz w:val="20"/></w:rPr><w:t>${escXml(label)}</w:t></w:r>
          </w:p>
        </w:tc>
        <w:tc>
          <w:tcPr>
            <w:tcW w:w="${colWidths[3]}" w:type="dxa"/>
            ${cellBorders}
            <w:shd w:val="clear" w:color="auto" w:fill="FFFF99"/>
            <w:vAlign w:val="center"/>
          </w:tcPr>
          <w:p>

          </w:p>
        </w:tc>
      </w:tr>`;
    }
  }

  const gridCols = colWidths.map(w => `<w:gridCol w:w="${w}"/>`).join('');

  // NOTA: o título "TABELA DE VALORES" JÁ EXISTE no template acima do
  // marcador ZZTABELADESCONTOSZZ — não precisamos injetar aqui.

  const tabela = `<w:tbl>
    <w:tblPr>
      <w:tblW w:w="${totalWidth}" w:type="dxa"/>
      <w:jc w:val="center"/>
      <w:tblLayout w:type="fixed"/>
      <w:tblLook w:val="04A0"/>

    <w:tblGrid>${gridCols}</w:tblGrid>

  return tabela;
}

/**
 * Converte string base64 em ArrayBuffer. Usado pra decodificar tanto o
 * template embutido quanto a selfie.
 */
function base64ParaArrayBuffer(b64) {
  const binary = atob(b64);
  const len = binary.length;
  const bytes = new Uint8Array(len);
  for (let i = 0; i < len; i++) {
    bytes[i] = binary.charCodeAt(i);
  }
  return bytes.buffer;
}

/**
 * Aplica uma borda sutil na imagem (passa base64 → retorna base64 processado).
 * A borda é um retângulo de 3px de espessura com cor neutra, deixando a
 * foto "emoldurada" no documento final.
 */
function aplicarBordaSelfie(dataURL) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const borda = 3;             // 3px de borda
      const corBorda = '#4a4a4a';  // cinza escuro discreto
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      // Desenha a imagem original
      ctx.drawImage(img, 0, 0);
      // Desenha o retângulo de borda por cima (contorno)
      ctx.strokeStyle = corBorda;
      ctx.lineWidth = borda;
      // strokeRect desenha centrado na coordenada, então compensamos com borda/2
      ctx.strokeRect(borda / 2, borda / 2, canvas.width - borda, canvas.height - borda);
      // Retorna como JPEG com qualidade alta
      // (JPEG gera arquivo menor que PNG pra fotos; docxtemplater aceita qualquer um)
      resolve(canvas.toDataURL('image/jpeg', 0.92));
    };
    img.onerror = (e) => reject(new Error('Falha ao processar imagem pra borda'));
    img.src = dataURL;
  });
}

/**
 * Carrega o template V5 (em base64 embutido), monta o contexto, aplica o image
 * module pra embutir a selfie (se houver), renderiza e retorna o blob .docx.
 */
async function montarDocxNoNavegador() {
  // Verifica se as libs carregaram. Conforme docs oficiais:
  // - pizzip expõe window.PizZip
  // - docxtemplater expõe window.docxtemplater (minúsculo)
  // - image module pode expor global com vários nomes dependendo do fork/build.
  //   Tentamos múltiplas opções pra ser robusto.
  if (typeof PizZip === 'undefined') {
    throw new Error('PizZip não carregou — cheque a conexão ou o CDN.');
  }
  if (typeof window.docxtemplater === 'undefined') {
    throw new Error('Docxtemplater não carregou — cheque a conexão ou o CDN.');
  }

  // Detecta o ImageModule em qualquer nome possível que forks usam
  const ImageModuleClass =
    window.ImageModule ||
    window.DocxtemplaterImageModule ||
    window.docxtemplaterImageModule ||
    window.docxtemplaterImageHyperlinkModuleFree ||
    window.docxtemplaterImageModuleFree ||
    window['docxtemplater-image-module-free'] ||
    window['docxtemplater-image-hyperlink-module-free'];

  if (!ImageModuleClass) {
    // Lista todos os globals pra facilitar debug
    const globalsImage = Object.keys(window).filter(k =>
      /image|docxtempl/i.test(k) && typeof window[k] === 'function'
    );
    console.error('ImageModule não encontrado. Globals relacionados:', globalsImage);
    console.error('window.ImageModule:', window.ImageModule);
    console.error('Todos globais novos (exceto nativos):', Object.keys(window).filter(k =>
      !['window','document','location','navigator','history','console'].includes(k) &&
      typeof window[k] === 'function' && !k.startsWith('webkit') && !k.startsWith('on')
    ).slice(0, 50));
    throw new Error('ImageModule não carregou — cheque o console pra ver quais globals existem.');
  }

  const DocxtemplaterClass = window.docxtemplater;

  // 1. Decodifica o template embutido
  const templateBuffer = base64ParaArrayBuffer(TEMPLATE_DOCX_BASE64);

  // 2. Prepara a selfie (se houver) — aplica borda discreta antes de embutir
  let selfieBuffer = null;
  if (state.anexos.selfie && typeof state.anexos.selfie === 'object') {
    // Primeiro aplica borda via canvas, depois converte pra ArrayBuffer
    const dataURLComBorda = await aplicarBordaSelfie(state.anexos.selfie.base64);
    const selfieB64 = dataURLComBorda.replace(/^data:[^;]+;base64,/, '');
    selfieBuffer = base64ParaArrayBuffer(selfieB64);
  }

  // 3. Configura image module
  const imageModule = new ImageModuleClass({
    centered: false,
    fileType: 'docx',
    getImage: (tagValue, tagName) => {
      // Se chegou aqui mas não tem selfie, devolve um pixel transparente mínimo
      // pra o docxtemplater não quebrar. Na prática isso não acontece porque
      // o fluxo não renderiza a tag {%selfie} sem imagem.
      if (!selfieBuffer) {
        throw new Error('Selfie não anexada — peça não pode ser gerada com {%selfie}');
      }
      return selfieBuffer;
    },
    getSize: (img, tagValue, tagName) => {
      // 605 x 416 pixels — tamanho padrão do modelo oficial (16cm x 11cm)
      // Proporção ~3:2, fluxo natural na página sem forçar quebra
      return [605, 416];
    },
  });

  // 4. Carrega o template como ZIP
  const zip = new PizZip(templateBuffer);

  // 5. Cria instance do docxtemplater
  const doc = new DocxtemplaterClass(zip, {
    modules: [imageModule],
    paragraphLoop: true,
    linebreaks: true,
  });

  // 6. Monta o contexto com todos os dados
  const contexto = montarContextoDocx();

  // 7. Se usuário pulou a selfie, remove a tag {%selfie} do contexto ANTES de renderizar
  // (o template ainda tem {%selfie} — sem valor ele vai renderizar sem imagem)
  if (!selfieBuffer) {
    // Remove a chave pra o image module pular sem crashar
    delete contexto.selfie;
  }

  // 8. Renderiza
  doc.render(contexto);

  // 9. PÓS-PROCESSAMENTO: injeta o XML da tabela de descontos no lugar do
  // marcador `ZZTABELADESCONTOSZZ`. Essa abordagem dá controle total sobre
  // o layout (linhas mescladas pra subtítulos, cores de destaque no total,
  // fidelidade absoluta à estrutura do XLSX) — impossível de alcançar via
  // loop nativo do docxtemplater.
  const zipFinal = doc.getZip();
  let documentXml = zipFinal.file('word/document.xml').asText();

  const tab = state.anexos.tabelaXlsx;
  const linhasPraTabela = (tab && typeof tab === 'object' && Array.isArray(tab.linhasClassificadas))
    ? tab.linhasClassificadas
    : null; // null/undefined → montarTabelaXmlDescontos gera um parágrafo de aviso

  const tabelaXml = montarTabelaXmlDescontos(linhasPraTabela);
  // O marcador está dentro de um <w:p>...ZZTABELADESCONTOSZZ...</w:p> —
  // substituímos o parágrafo inteiro pelo XML da nova tabela (ou aviso).
  const padraoMarcador = /<w:p\b[^>]*>(?:(?!<\/w:p>).)*ZZTABELADESCONTOSZZ(?:(?!<\/w:p>).)*<\/w:p>/s;
  if (padraoMarcador.test(documentXml)) {
    documentXml = documentXml.replace(padraoMarcador, tabelaXml);
    zipFinal.file('word/document.xml', documentXml);
  } else {
    console.warn('Marcador ZZTABELADESCONTOSZZ não encontrado no template renderizado. Tabela não foi injetada.');
  }

  // 10. Gera o blob do .docx final
  const outputBuffer = zipFinal.generate({
    type: 'blob',
    mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
    compression: 'DEFLATE',
  });

  return outputBuffer;
}

function baixarPeca() {
  if (!state.arquivoFinalBlob) { alert('Arquivo não disponível.'); return; }
  const url = URL.createObjectURL(state.arquivoFinalBlob);
  const a = document.createElement('a');
  a.href = url;
  // Sempre .docx agora (geração no frontend via docxtemplater)
  a.download = `peticao_${(state.dadosPacote1.nome_completo || 'cliente').replace(/\s+/g, '_')}_${Date.now()}.docx`;
  a.click();
  URL.revokeObjectURL(url);
}

  state.trechosIA = {};

  state.anexos.tabelaXlsx = null;

  navegarPara('pacote3');
}

// - anon key: está em Supabase → Project Settings → API Keys → anon public
const SUPABASE_URL = 'https://xmzkrkyftchyuygiamdv.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhtemtya3lmdGNoeXV5Z2lhbWR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MDY1NjgsImV4cCI6MjA5MjE4MjU2OH0.PzXOPcaAA_FRYtsKlfPzUKGfb-ydfTppEKtTNrX7TRs';

function supabaseConfigurado() {
  return SUPABASE_URL && !SUPABASE_URL.startsWith('COLAR_') &&
         SUPABASE_ANON_KEY && !SUPABASE_ANON_KEY.startsWith('COLAR_');
}

async function carregarConfigDoSupabase() {
  if (!supabaseConfigurado()) {
    console.warn('Supabase não configurado no HTML. Cole URL e anon key no topo do script.');
    return false;
  }
  try {
    const resp = await fetch(
      `${SUPABASE_URL}/rest/v1/app_config?id=eq.1&select=webhook_trechos,webhook_peca`,
      {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        },
      }
    );
    if (!resp.ok) throw new Error('Supabase respondeu ' + resp.status);
    const rows = await resp.json();
    if (rows.length === 0) throw new Error('Tabela app_config vazia (rode o SQL de setup).');
    state.config.webhookTrechos = rows[0].webhook_trechos || '';
    state.config.webhookPeca    = rows[0].webhook_peca    || '';
    state.configCarregada = true;
    return true;
  } catch (e) {
    console.error('Erro ao carregar config:', e);
    return false;
  }
}

async function salvarConfigNoSupabase(senha, urlTrechos, urlPeca) {
  if (!supabaseConfigurado()) {
    throw new Error('Supabase não configurado no HTML');
  }
  const resp = await fetch(`${SUPABASE_URL}/rest/v1/rpc/update_app_config`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({
      p_password: senha,
      p_webhook_trechos: urlTrechos,
      p_webhook_peca: urlPeca,
    }),
  });
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  const result = await resp.json();
  if (!result || result.ok !== true) {
    throw new Error(result?.error || 'Falha ao salvar');
  }
  return true;
}

function temConfigValida() {
  // Apenas o webhook de trechos é realmente necessário — a geração do .docx
  // agora acontece no próprio navegador. O webhook de peça é mantido no state
  // e no Supabase por compatibilidade, mas não é mais usado.
  return !!state.config.webhookTrechos;
}

// Guardamos a senha validada em memória (só durante a sessão) pra reusar no salvar
let _senhaValidada = '';

function mostrarEtapa(qual) {
  document.getElementById('modalStageGate').style.display  = qual === 'gate'  ? '' : 'none';
  document.getElementById('modalStagePanel').style.display = qual === 'panel' ? '' : 'none';
}

function abrirConfig() {
  // Sempre começa na etapa de senha
  mostrarEtapa('gate');
  document.getElementById('gatePasswordInput').value = '';
  const gateMsg = document.getElementById('gateMsg');
  if (gateMsg) { gateMsg.textContent = ''; gateMsg.className = 'modal-msg'; }
  _senhaValidada = '';
  document.getElementById('modalConfig').classList.remove('hidden');
  // Foca o campo da senha
  setTimeout(() => document.getElementById('gatePasswordInput').focus(), 50);
}

function fecharConfig() {
  document.getElementById('modalConfig').classList.add('hidden');
  _senhaValidada = '';
}

// Valida a senha no Supabase fazendo uma tentativa "dry-run": passa a senha
// e as URLs atuais (mesmas que já estão salvas). Se a senha bater, a RPC retorna
// {ok:true}. Se não, {ok:false, error:"Senha inválida"}.
async function destrancarConfig() {
  const senha = document.getElementById('gatePasswordInput').value;
  const gateMsg = document.getElementById('gateMsg');
  const btn = document.getElementById('btnDestrancar');

  if (!senha) {
    gateMsg.textContent = 'Digite a senha.';
    gateMsg.className = 'modal-msg modal-msg-err';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Verificando...';
  gateMsg.textContent = '';
  gateMsg.className = 'modal-msg';

  try {
    // Dry-run: passa a senha e as mesmas URLs atuais (não altera nada na prática)
    await salvarConfigNoSupabase(senha, state.config.webhookTrechos, state.config.webhookPeca);
    _senhaValidada = senha;
    // Popula os campos com as URLs atuais e avança
    document.getElementById('webhookTrechosInput').value = state.config.webhookTrechos;
    document.getElementById('webhookPecaInput').value    = state.config.webhookPeca;
    const panelMsg = document.getElementById('panelMsg');
    if (panelMsg) { panelMsg.textContent = ''; panelMsg.className = 'modal-msg'; }
    mostrarEtapa('panel');
  } catch (e) {
    gateMsg.textContent = 'Senha incorreta.';
    gateMsg.className = 'modal-msg modal-msg-err';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
}

async function salvarConfig() {
  const t = document.getElementById('webhookTrechosInput').value.trim();
  const p = document.getElementById('webhookPecaInput').value.trim();
  const panelMsg = document.getElementById('panelMsg');
  const btn = document.getElementById('btnSalvarConfig');

  if (!t || !p) {
    panelMsg.textContent = 'Preencha as duas URLs.';
    panelMsg.className = 'modal-msg modal-msg-err';
    return;
  }
  // Se não houve mudança, nem chama a API
  if (t === state.config.webhookTrechos && p === state.config.webhookPeca) {
    panelMsg.textContent = 'Nada mudou.';
    panelMsg.className = 'modal-msg';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Salvando...';
  panelMsg.textContent = '';
  panelMsg.className = 'modal-msg';

  try {
    await salvarConfigNoSupabase(_senhaValidada, t, p);
    state.config.webhookTrechos = t;
    state.config.webhookPeca = p;
    atualizarBtnConfig();
    panelMsg.textContent = '✓ Salvo. Refletirá pra todos no próximo load.';
    panelMsg.className = 'modal-msg modal-msg-ok';
    setTimeout(() => fecharConfig(), 1400);
  } catch (e) {
    panelMsg.textContent = 'Erro: ' + e.message;
    panelMsg.className = 'modal-msg modal-msg-err';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Salvar alterações';
  }
}
function atualizarBtnConfig() {
  const btn = document.getElementById('configBtn');
  if (!btn) return;
  btn.classList.remove('configured', 'needs-config');
  if (temConfigValida()) btn.classList.add('configured');
  else btn.classList.add('needs-config');
}

  state.seguranca = { ...SEGURANCA_DEFAULT };

  }
});
