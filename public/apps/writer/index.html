<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AW Writer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* =========================================================================
   TOKENS — replicando linguagem visual do bradesco-analyzer
   (azul #60a5fa -> roxo #8b5cf6)
   ========================================================================= */
:root {
  /* Paleta — quase preto puro, roxo só como accent */
  --bg: rgba(8, 6, 14, 1);
  --bg-modal: rgba(2, 1, 5, 0.9);
  --bg-card: rgba(12, 10, 18, 0.97);
  --bg-glass: rgba(14, 11, 22, 0.7);
  --bg-row-hover: rgba(255, 255, 255, 0.02);

  --line-dim: rgba(255, 255, 255, 0.04);
  --line: rgba(255, 255, 255, 0.06);
  --line-bright: rgba(255, 255, 255, 0.1);

  --violet: #8b5cf6;
  --violet-soft: #a78bfa;
  --violet-deep: #6d28d9;
  --violet-border: rgba(139, 92, 246, 0.28);
  --violet-border-soft: rgba(139, 92, 246, 0.15);
  --violet-bg: rgba(139, 92, 246, 0.06);
  --violet-glow: rgba(139, 92, 246, 0.3);
  --violet-gradient: linear-gradient(135deg, rgba(139, 92, 246, 0.1) 0%, rgba(109, 40, 217, 0.04) 100%);

  /* Texto — slate scale */
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --text-mute: #64748b;
  --text-faint: #475569;
  --text-ghost: #334155;

  --red: #f87171;
  --green: #4ade80;
  --amber: #fbbf24;
  --amber-soft: #fcd34d;
  --amber-glow: rgba(251, 191, 36, 0.35);
  --amber-border: rgba(251, 191, 36, 0.4);
  --amber-bg: rgba(251, 191, 36, 0.08);

  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}

/* =========================================================================
   RESET
   ========================================================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  letter-spacing: -0.01em;
}

button {
  font-family: inherit;
  color: inherit;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
}

input, select, textarea {
  font-family: inherit;
  color: inherit;
}

/* =========================================================================
   UTIL
   ========================================================================= */
.hidden { display: none !important; }
.caps {
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
}
.tabular { font-variant-numeric: tabular-nums; }

/* =========================================================================
   TOPBAR
   ========================================================================= */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 32px;
  background: rgba(8, 6, 14, 0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}
.brand-name {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text);
}
.brand-name .slash { color: var(--violet); }

.topbar-right {
  display: flex;
  align-items: center;
  gap: 14px;
}

.stepper {
  display: flex;
  gap: 4px;
  align-items: center;
}
.step-dot {
  width: 24px;
  height: 2px;
  background: var(--line-bright);
  transition: all 0.3s ease;
}
.step-dot.active { background: var(--violet); box-shadow: 0 0 6px var(--violet); }
.step-dot.done { background: var(--violet-deep); }

.config-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 34px;
  height: 34px;
  padding: 0;
  color: var(--text-mute);
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--line-bright);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.18s;
}
.config-btn svg { width: 15px; height: 15px; }
.config-btn:hover { color: var(--text); border-color: var(--violet-border); background: rgba(139, 92, 246, 0.08); }
.config-btn.configured { color: var(--text-mute); border-color: var(--line-bright); }
.config-btn.needs-config { color: var(--violet); border-color: var(--violet-border); }

/* =========================================================================
   BOTÕES
   ========================================================================= */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 11px 22px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  transition: all 0.2s;
  border: 1px solid transparent;
  cursor: pointer;
  white-space: nowrap;
}
.btn-primary {
  background: var(--violet);
  color: white;
  box-shadow: 0 0 20px rgba(139, 92, 246, 0.3), inset 0 1px 0 rgba(255,255,255,0.12);
}
.btn-primary:hover {
  background: var(--violet-soft);
  box-shadow: 0 0 32px rgba(139, 92, 246, 0.5), inset 0 1px 0 rgba(255,255,255,0.2);
  transform: translateY(-1px);
}
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled {
  background: rgba(255,255,255,0.04);
  color: var(--text-ghost);
  cursor: not-allowed;
  box-shadow: none;
  border-color: var(--line);
}
.btn-ghost {
  background: rgba(255,255,255,0.03);
  color: var(--text-dim);
  border-color: var(--line-bright);
}
.btn-ghost:hover {
  color: var(--text);
  border-color: var(--violet-border);
  background: var(--violet-bg);
}
.btn-small { padding: 7px 14px; font-size: 10px; letter-spacing: 1.2px; }

.btn-link {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-mute);
  background: transparent;
  padding: 8px 0;
  transition: color 0.15s;
}
.btn-link:hover { color: var(--violet-soft); }

/* =========================================================================
   TELA 1: LOBBY (cards Netflix com espaço pra capa)
   ========================================================================= */
.lobby {
  padding: 40px 40px 80px;
  animation: fadeSlide 0.35s ease;
  max-width: 1400px;
  margin: 0 auto;
}

.lobby-hero {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding-bottom: 28px;
  margin-bottom: 44px;
  border-bottom: 1px solid var(--line);
}
.lobby-hero-left .eyebrow {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--violet);
  margin-bottom: 12px;
}
.lobby-hero h1 {
  font-size: 36px;
  font-weight: 800;
  line-height: 1.05;
  letter-spacing: -1px;
  color: var(--text);
}
.lobby-hero h1 .accent { color: var(--violet); }

.lobby-hero-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
}
.lobby-hero-right .stat-label {
  font-size: 0.58rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-ghost);
}
.lobby-hero-right .stat-value {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-dim);
  letter-spacing: -0.2px;
}

/* Barra de pesquisa */
.search-bar {
  position: relative;
  margin-bottom: 40px;
  max-width: 520px;
}
.search-bar-input {
  width: 100%;
  padding: 13px 16px 13px 44px;
  background: var(--bg-glass);
  border: 1px solid var(--line);
  color: var(--text);
  font-size: 13px;
  border-radius: 8px;
  transition: all 0.18s;
  letter-spacing: -0.1px;
  backdrop-filter: blur(12px);
  position: relative;
  z-index: 1;
}
.search-bar-input::placeholder {
  color: var(--text-faint);
  font-weight: 500;
}
.search-bar-input:focus {
  outline: none;
  border-color: var(--violet-border);
  box-shadow: 0 0 0 3px var(--violet-border-soft);
  background: rgba(14, 11, 22, 0.9);
}
.search-bar-icon {
  position: absolute;
  left: 15px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  color: var(--text-mute);
  pointer-events: none;
  transition: color 0.18s;
  z-index: 2;
}
.search-bar:focus-within .search-bar-icon { color: var(--violet); }
.search-bar-clear {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  color: var(--text-mute);
  background: transparent;
  border: none;
  cursor: pointer;
  transition: all 0.15s;
  padding: 0;
}
.search-bar-clear:hover { color: var(--text); background: var(--line-bright); }

.search-empty {
  padding: 60px 40px;
  text-align: center;
  color: var(--text-mute);
  font-size: 13px;
}
.search-empty strong { color: var(--text); display: block; margin-bottom: 4px; font-size: 15px; }
.search-empty em { color: var(--violet-soft); font-style: normal; font-weight: 600; }

/* Shelves */
.shelf { margin-bottom: 48px; }
.shelf-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
}
.shelf-title {
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--text-mute);
}
.shelf-divider {
  flex: 1;
  height: 1px;
  background: var(--line);
}
.shelf-count {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-ghost);
}

/* Wrap sangra até a borda direita da viewport pra criar o corte do último card */
.shelf-scroll-wrap {
  position: relative;
  margin-right: -40px; /* compensa o padding do .lobby */
}
.shelf-scroll-wrap::after {
  /* Vinheta suave na direita, pra reforçar a sensação de "há mais conteúdo" */
  content: "";
  position: absolute;
  top: 0;
  right: 0;
  bottom: 0;
  width: 80px;
  pointer-events: none;
  background: linear-gradient(270deg, var(--bg) 0%, transparent 100%);
  z-index: 2;
}

.shelf-grid {
  display: flex;
  gap: 16px;
  overflow-x: auto;
  overflow-y: visible;
  padding: 4px 40px 20px 0; /* padding-right: 40px garante que, no final do scroll, não fique sem respiro */
  scrollbar-width: thin;
  scrollbar-color: var(--line-bright) transparent;
  scroll-snap-type: x proximity;
}
.shelf-grid::-webkit-scrollbar { height: 6px; }
.shelf-grid::-webkit-scrollbar-track { background: transparent; }
.shelf-grid::-webkit-scrollbar-thumb { background: var(--line-bright); border-radius: 3px; }
.shelf-grid::-webkit-scrollbar-thumb:hover { background: var(--violet-border); }

/* Card vertical tipo Netflix — largura fixa pra funcionar com scroll horizontal */
.product-card {
  position: relative;
  flex: 0 0 260px;
  width: 260px;
  aspect-ratio: 2 / 3.1;
  background: var(--bg-glass);
  border: 1px solid var(--line);
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
  animation: cIn 0.4s ease both;
  scroll-snap-align: start;
}
.product-card:hover {
  border-color: var(--violet);
  transform: translateY(-4px);
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4), 0 0 24px var(--violet-glow);
}
.product-card.locked {
  opacity: 0.35;
  cursor: not-allowed;
}
.product-card.locked:hover {
  transform: none;
  border-color: var(--line);
  box-shadow: none;
}

/* Placeholder visual caso não tenha capa */
.product-cover {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 62%;
  background: var(--violet-gradient);
  background-size: cover;
  background-position: center;
}
.product-cover.has-image {
  background-color: var(--bg-card);
  background-size: cover;
  background-position: center 30%;
}
.product-cover.has-image::after {
  /* Transição suave e longa da imagem pro fundo do card */
  background: linear-gradient(180deg,
    rgba(8,6,14,0) 0%,
    rgba(8,6,14,0) 40%,
    rgba(8,6,14,0.25) 65%,
    rgba(8,6,14,0.7) 85%,
    rgba(8,6,14,1) 100%);
}
.product-cover::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg,
    rgba(8,6,14,0) 0%,
    rgba(8,6,14,0) 40%,
    rgba(8,6,14,0.25) 65%,
    rgba(8,6,14,0.7) 85%,
    rgba(8,6,14,1) 100%);
}

/* Padrão geométrico de placeholder (quando não há imagem) */
.product-cover.placeholder {
  background:
    radial-gradient(circle at 30% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
    radial-gradient(circle at 70% 80%, rgba(139, 92, 246, 0.08) 0%, transparent 60%),
    var(--bg-glass);
}
.product-cover.placeholder::before {
  content: "";
  position: absolute;
  inset: 20px;
  border: 1px solid var(--violet-border-soft);
  border-radius: 8px;
  background-image:
    linear-gradient(0deg, transparent 49%, rgba(255,255,255,0.02) 49%, rgba(255,255,255,0.02) 51%, transparent 51%),
    linear-gradient(90deg, transparent 49%, rgba(255,255,255,0.02) 49%, rgba(255,255,255,0.02) 51%, transparent 51%);
  background-size: 40px 40px;
}
.product-cover-mark {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 64px;
  font-weight: 900;
  color: var(--violet);
  opacity: 0.4;
  letter-spacing: -4px;
}

/* Conteúdo sobre o card — dividido em duas zonas:
   top (flutua sobre a imagem) + bottom (na metade inferior limpa) */
.product-content {
  position: absolute;
  inset: 0;
  z-index: 1;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  pointer-events: none;
}
.product-content > * { pointer-events: auto; }

.product-top {
  display: flex;
  align-items: flex-start;
  justify-content: flex-end;
  gap: 8px;
  padding: 14px 14px 0;
}
.product-chip {
  font-size: 0.56rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--violet-soft);
  padding: 4px 8px;
  background: rgba(139, 92, 246, 0.18);
  border: 1px solid var(--violet-border);
  border-radius: 4px;
  white-space: nowrap;
  backdrop-filter: blur(6px);
}
.product-chip.locked {
  color: var(--text-ghost);
  background: rgba(0,0,0,0.35);
  border-color: var(--line-bright);
}
.product-icon {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(139, 92, 246, 0.18);
  border: 1px solid var(--violet-border);
  border-radius: 6px;
  font-size: 14px;
  font-weight: 900;
  color: var(--violet);
  backdrop-filter: blur(6px);
}

.product-bottom {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 14px 18px 18px;
}
.product-title {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.3px;
  line-height: 1.15;
  color: var(--text);
}
.product-reu {
  font-size: 0.58rem;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--violet-soft);
  margin-bottom: 2px;
}
.product-sub {
  font-size: 11px;
  color: var(--text-mute);
  line-height: 1.4;
  font-weight: 500;
  margin-bottom: 2px;
}
.product-category {
  font-size: 0.56rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 4px;
}

/* Rubricas — chips pequenos que identificam exatamente quais descontos a ação cobre */
.product-rubricas {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed var(--line);
}
.rubrica-chip {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.3px;
  padding: 2px 5px;
  background: rgba(139, 92, 246, 0.08);
  color: var(--violet-soft);
  border: 1px solid var(--violet-border-soft);
  border-radius: 3px;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}
.rubrica-chip.locked {
  background: rgba(255, 255, 255, 0.03);
  color: var(--text-faint);
  border-color: var(--line-bright);
}

/* =========================================================================
   TELAS DE FORMULÁRIO
   ========================================================================= */
.form-page {
  max-width: 920px;
  margin: 0 auto;
  padding: 40px 40px 80px;
  animation: fadeSlide 0.32s ease;
}

.form-header { margin-bottom: 32px; }
.form-eyebrow {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--violet);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.form-eyebrow::before {
  content: "";
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--violet);
  box-shadow: 0 0 6px var(--violet);
}
.form-title {
  font-size: 30px;
  font-weight: 800;
  letter-spacing: -0.8px;
  line-height: 1.1;
  color: var(--text);
  margin-bottom: 8px;
}
.form-title .accent { color: var(--violet); }
.form-sub {
  color: var(--text-mute);
  font-size: 13px;
  line-height: 1.55;
  max-width: 620px;
}

/* Banner informativo */
.info-banner {
  display: flex;
  gap: 12px;
  padding: 12px 16px;
  background: rgba(139, 92, 246, 0.05);
  border: 1px solid var(--violet-border-soft);
  border-left: 2px solid var(--violet);
  border-radius: 6px;
  margin-bottom: 24px;
}
.info-banner-content {
  flex: 1;
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.55;
}
.info-banner-content strong { color: var(--text); font-weight: 600; }
.info-banner-label {
  font-size: 0.58rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--violet);
  margin-bottom: 3px;
  display: block;
}

/* =========================================================================
   ANEXOS (selfie, xlsx)
   ========================================================================= */
.anexo-block {
  background: var(--bg-glass);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 20px 22px;
  margin-bottom: 20px;
  transition: border-color 0.22s, background-color 0.22s;
}
.anexo-block.anexado {
  border-color: var(--violet-border);
  background: linear-gradient(180deg, var(--violet-bg) 0%, var(--bg-glass) 50%);
}
.anexo-block.pulado {
  border-color: var(--amber-border);
}
.anexo-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 16px;
}
.anexo-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.2px;
  margin-bottom: 4px;
}
.anexo-sub {
  font-size: 12px;
  color: var(--text-mute);
  line-height: 1.5;
  max-width: 520px;
}
.anexo-badge {
  flex-shrink: 0;
  font-size: 0.56rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 5px 10px;
  border-radius: 4px;
  background: rgba(255,255,255,0.03);
  color: var(--text-mute);
  border: 1px solid var(--line-bright);
  white-space: nowrap;
}
.anexo-block.anexado .anexo-badge {
  background: var(--violet-bg);
  color: var(--violet-soft);
  border-color: var(--violet-border);
}
.anexo-block.pulado .anexo-badge {
  background: var(--amber-bg);
  color: var(--amber);
  border-color: var(--amber-border);
}

.anexo-dropzone {
  border: 1.5px dashed var(--line-bright);
  border-radius: 10px;
  padding: 28px 20px;
  text-align: center;
  transition: border-color 0.2s, background-color 0.2s;
  background: rgba(0,0,0,0.15);
}
.anexo-dropzone.drag-over {
  border-color: var(--violet);
  background: var(--violet-bg);
}
.anexo-icon {
  width: 36px;
  height: 36px;
  color: var(--text-mute);
  margin: 0 auto 12px;
  display: block;
}
.anexo-dropzone-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
}
.anexo-dropzone-sub {
  font-size: 11.5px;
  color: var(--text-mute);
  margin-bottom: 16px;
}
.anexo-dropzone-actions {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}
.anexo-dropzone-actions .btn {
  cursor: pointer;
}

.anexo-preview {
  display: flex;
  gap: 18px;
  align-items: center;
  background: rgba(0,0,0,0.2);
  border-radius: 8px;
  padding: 14px;
}
.anexo-preview-img {
  width: 90px;
  height: 90px;
  object-fit: cover;
  border-radius: 6px;
  border: 1px solid var(--violet-border);
  flex-shrink: 0;
}
.anexo-preview-info {
  flex: 1;
  min-width: 0;
}
.anexo-preview-nome {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  word-break: break-all;
  margin-bottom: 4px;
}
.anexo-preview-tamanho {
  font-size: 11px;
  color: var(--text-mute);
  margin-bottom: 10px;
}
.anexo-remover {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: var(--red);
  background: transparent;
  border: 1px solid rgba(248, 113, 113, 0.3);
  border-radius: 4px;
  padding: 5px 10px;
  cursor: pointer;
  transition: background-color 0.15s;
}
.anexo-remover:hover {
  background: rgba(248, 113, 113, 0.1);
}

/* Ícone grande pra preview da tabela XLSX (sem thumbnail, usa SVG) */
.anexo-preview-icon-wrap {
  width: 64px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(167, 139, 250, 0.08);
  border: 1px solid var(--violet-border);
  border-radius: 8px;
  flex-shrink: 0;
}
.anexo-preview-icon-large {
  width: 32px;
  height: 32px;
  color: var(--accent);
  stroke-width: 1.4;
}

/* Bloco de seleção de rubricas aplicáveis (Pacote 3) */
.rubricas-block {
  background: rgba(139, 92, 246, 0.04);
  border: 1px solid rgba(139, 92, 246, 0.16);
  border-radius: 14px;
  padding: 18px 20px;
  margin-bottom: 24px;
}
.rubricas-header {
  margin-bottom: 14px;
}
.rubricas-titulo {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.2px;
  margin-bottom: 4px;
}
.rubricas-subtitulo {
  font-size: 12.5px;
  color: var(--text-muted);
  line-height: 1.5;
}
.rubricas-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.rubrica-check {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s ease;
  background: rgba(255, 255, 255, 0.02);
}
.rubrica-check:hover {
  border-color: rgba(139, 92, 246, 0.35);
  background: rgba(139, 92, 246, 0.06);
}
.rubrica-check.marcada {
  border-color: rgba(139, 92, 246, 0.55);
  background: rgba(139, 92, 246, 0.1);
}
.rubrica-check input[type="checkbox"] {
  display: none;
}
.rubrica-check-box {
  width: 18px;
  height: 18px;
  border: 1.8px solid rgba(255, 255, 255, 0.35);
  border-radius: 5px;
  flex-shrink: 0;
  position: relative;
  transition: all 0.15s ease;
}
.rubrica-check.marcada .rubrica-check-box {
  background: var(--accent);
  border-color: var(--accent);
}
.rubrica-check.marcada .rubrica-check-box::after {
  content: '';
  position: absolute;
  left: 5px;
  top: 1px;
  width: 5px;
  height: 10px;
  border: solid #fff;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}
.rubrica-check-label {
  font-size: 13.5px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.3px;
}
.rubrica-check-sub {
  font-size: 12px;
  font-weight: 400;
  color: var(--text-muted);
  margin-left: 4px;
}
.rubricas-aviso-erro {
  margin-top: 12px;
  padding: 10px 14px;
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.35);
  border-radius: 8px;
  color: #fca5a5;
  font-size: 12.5px;
  font-weight: 500;
}

/* Alerta de divergência entre valor manual e planilha (Pacote 3) */
.diverg-alert {
  display: flex;
  gap: 14px;
  align-items: flex-start;
  grid-column: 1 / -1; /* ocupa toda a largura do calc-panel grid */
  background: rgba(251, 191, 36, 0.08);
  border: 1px solid rgba(251, 191, 36, 0.35);
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 12px;
}
.diverg-icon {
  width: 22px;
  height: 22px;
  color: #fbbf24;
  flex-shrink: 0;
  margin-top: 2px;
}
.diverg-body {
  flex: 1;
  min-width: 0;
}
.diverg-title {
  font-size: 13px;
  font-weight: 600;
  color: #fbbf24;
  margin-bottom: 6px;
  letter-spacing: 0.2px;
}
.diverg-lista {
  list-style: none;
  padding: 0;
  margin: 0;
}
.diverg-item {
  font-size: 12px;
  color: var(--text);
  line-height: 1.6;
  padding: 6px 0;
  border-top: 1px solid rgba(251, 191, 36, 0.12);
}
.diverg-item:first-child {
  border-top: none;
  padding-top: 0;
}
.diverg-manual {
  color: #f87171;
  font-weight: 600;
}
.diverg-planilha {
  color: #34d399;
  font-weight: 600;
}
.diverg-aplicar {
  display: inline-block;
  margin-left: 8px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
  color: var(--accent);
  background: transparent;
  border: 1px solid var(--violet-border);
  border-radius: 4px;
  padding: 3px 8px;
  cursor: pointer;
  transition: background-color 0.15s;
}
.diverg-aplicar:hover {
  background: rgba(167, 139, 250, 0.12);
}

/* Bloco escolher cliente */
.client-picker {
  background: var(--bg-glass);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 18px;
  margin-bottom: 28px;
  backdrop-filter: blur(12px);
}
.client-picker-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
}
.client-picker-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.2px;
  margin-bottom: 3px;
}
.client-picker-sub {
  font-size: 11px;
  color: var(--text-mute);
  line-height: 1.5;
}
.client-picker-badge {
  font-size: 0.56rem;
  font-weight: 700;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: var(--text-ghost);
  padding: 3px 8px;
  border: 1px solid var(--line-bright);
  border-radius: 3px;
}
/* Dropdown customizado (substitui select nativo feio) */
.custom-dropdown {
  position: relative;
  width: 100%;
}
.custom-dropdown-trigger {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 11px 14px;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--line-bright);
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  border-radius: 6px;
  cursor: pointer;
  transition: border-color 0.18s, background-color 0.18s;
  text-align: left;
}
.custom-dropdown-trigger:hover {
  border-color: var(--violet-border);
}
.custom-dropdown.open .custom-dropdown-trigger {
  border-color: var(--violet);
  background: rgba(139, 92, 246, 0.05);
}
.custom-dropdown-label {
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.custom-dropdown-label strong { font-weight: 700; color: var(--text); }
.custom-dropdown-arrow {
  width: 11px;
  height: 7px;
  color: var(--violet);
  flex-shrink: 0;
  margin-left: 10px;
  transition: transform 0.2s;
}
.custom-dropdown.open .custom-dropdown-arrow {
  transform: rotate(180deg);
}
.custom-dropdown-menu {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  right: 0;
  background: #0c0a14;
  border: 1px solid var(--violet-border-soft);
  border-radius: 8px;
  padding: 5px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 30px var(--violet-glow);
  z-index: 30;
  opacity: 0;
  transform: translateY(-4px);
  pointer-events: none;
  transition: opacity 0.15s, transform 0.15s;
  max-height: 280px;
  overflow-y: auto;
}
.custom-dropdown.open .custom-dropdown-menu {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.custom-dropdown-option {
  display: flex;
  align-items: center;
  width: 100%;
  padding: 9px 12px;
  background: transparent;
  border: none;
  color: var(--text-mute);
  font-size: 13px;
  font-family: inherit;
  text-align: left;
  border-radius: 5px;
  cursor: pointer;
  transition: background-color 0.12s, color 0.12s;
}
.custom-dropdown-option:hover {
  background: rgba(139, 92, 246, 0.1);
  color: var(--text);
}
.custom-dropdown-option.selected {
  background: var(--violet-bg);
  color: var(--violet-soft);
}
.custom-dropdown-option strong { font-weight: 700; color: var(--text); }

/* Fields */
.field-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}
.field-grid.full { grid-template-columns: 1fr; }
.field-grid .field.wide { grid-column: 1 / -1; }

.field { position: relative; }
.field-label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 7px;
  gap: 8px;
  min-height: 22px;
}
.field-label-text {
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: var(--text-mute);
}
.field-label-text .req {
  color: var(--red);
  margin-left: 3px;
}
.field-controls {
  display: flex;
  gap: 6px;
  align-items: center;
}

.field input,
.field select,
.field textarea {
  width: 100%;
  padding: 11px 14px;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--line-bright);
  color: var(--text);
  font-size: 13px;
  border-radius: 6px;
  transition: all 0.18s;
  letter-spacing: -0.1px;
}
.field input:focus,
.field select:focus,
.field textarea:focus {
  outline: none;
  border-color: var(--violet);
  box-shadow: 0 0 0 3px var(--violet-border-soft);
}
.field textarea {
  resize: vertical;
  min-height: 82px;
  line-height: 1.55;
}
.field input[type="number"],
.field input.tabular { font-variant-numeric: tabular-nums; }

.field select {
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
  cursor: pointer;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 12 8' fill='none'><path d='M1 1.5L6 6.5L11 1.5' stroke='%238b5cf6' stroke-width='1.5'/></svg>");
  background-repeat: no-repeat;
  background-position: right 14px center;
  padding-right: 34px;
}
.field select option {
  background: #0c0a12;
  color: var(--text);
  padding: 8px;
}
/* Firefox: esconder borda pontilhada do focus */
.field select::-moz-focus-inner { border: 0; }
.field select:-moz-focusring { color: transparent; text-shadow: 0 0 0 var(--text); }

.field.not-informed {
  opacity: 0.55;
  transition: opacity 0.2s;
}
.field.not-informed:hover { opacity: 0.85; }
.field.not-informed .field-label-text {
  color: var(--text-ghost);
}
.field.not-informed input,
.field.not-informed select,
.field.not-informed textarea {
  background: rgba(255, 255, 255, 0.015);
  color: var(--text-faint);
  border-style: dashed;
  border-color: var(--line);
  pointer-events: none;
  font-style: italic;
}
.field.not-informed input::placeholder,
.field.not-informed textarea::placeholder {
  color: var(--text-ghost);
  opacity: 0.7;
  font-style: italic;
}

/* Toggle de segurança (shield) — animação contida, sem afetar layout */
.shield-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 8px;
  height: 20px;
  box-sizing: border-box;
  border-radius: 4px;
  border: 1px solid var(--line-bright);
  background: rgba(255,255,255,0.02);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--text-ghost);
  cursor: pointer;
  white-space: nowrap;
  transition:
    color 0.25s ease,
    border-color 0.25s ease,
    background-color 0.25s ease;
  position: relative;
  overflow: hidden;
}
.shield-btn svg {
  width: 10px;
  height: 10px;
  flex-shrink: 0;
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.shield-btn.locked {
  color: var(--text-mute);
  border-color: var(--line-bright);
  background: rgba(255,255,255,0.04);
}
.shield-btn.open {
  color: var(--violet-soft);
  border-color: var(--violet-border-soft);
  background: rgba(139, 92, 246, 0.08);
}
.shield-btn.open svg {
  transform: scale(1.08);
}
.shield-btn:hover {
  border-color: var(--violet-border);
}
.shield-btn:active {
  transform: scale(0.96);
}
/* Pulso sutil no momento de clicar, contido no botão */
.shield-btn.flash::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: radial-gradient(circle, rgba(139,92,246,0.35) 0%, transparent 70%);
  opacity: 0;
  animation: shieldFlash 0.45s ease-out;
  pointer-events: none;
}
@keyframes shieldFlash {
  0%   { opacity: 0; transform: scale(0.5); }
  40%  { opacity: 1; }
  100% { opacity: 0; transform: scale(1.2); }
}

/* Toggle "não tenho" */
.no-info-btn {
  display: inline-flex;
  align-items: center;
  padding: 3px 8px;
  border-radius: 4px;
  border: 1px dashed var(--line-bright);
  background: transparent;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--text-ghost);
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
}
.no-info-btn:hover { color: var(--text-mute); border-color: var(--line-bright); border-style: solid; }
.no-info-btn.active {
  background: var(--amber-bg);
  color: var(--amber);
  border-color: var(--amber-border);
  border-style: solid;
}

.form-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 36px;
  padding-top: 24px;
  border-top: 1px solid var(--line);
}

/* Valores calculados (Pacote 3) */
.calc-panel {
  display: flex;
  gap: 16px;
  margin-top: 20px;
}
.calc-card {
  flex: 1;
  background: var(--bg-glass);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 14px 16px;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(12px);
}
.calc-card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--violet), transparent);
}
.calc-label {
  font-size: 0.56rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-ghost);
  margin-bottom: 6px;
}
.calc-value {
  font-size: 22px;
  font-weight: 800;
  color: var(--violet);
  letter-spacing: -0.8px;
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
.calc-value-prefix {
  font-size: 12px;
  color: var(--text-mute);
  font-weight: 600;
  margin-right: 4px;
  letter-spacing: 0;
}

/* =========================================================================
   TELA PREVIEW (cards de zona de IA)
   ========================================================================= */
.preview-page {
  max-width: 980px;
  margin: 0 auto;
  padding: 40px 40px 80px;
  animation: fadeSlide 0.32s ease;
}

.preview-legend {
  display: flex;
  gap: 20px;
  align-items: center;
  padding: 12px 16px;
  background: var(--bg-glass);
  border: 1px solid var(--line);
  border-radius: 8px;
  margin-bottom: 28px;
  backdrop-filter: blur(12px);
  font-size: 11px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 7px;
  color: var(--text-mute);
  font-weight: 500;
}
.legend-swatch {
  width: 10px;
  height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
}
.legend-swatch.fixed { background: var(--line-bright); }
.legend-swatch.ia { background: var(--violet); box-shadow: 0 0 6px var(--violet); }
.legend-swatch.edited {
  background: var(--amber);
  box-shadow: 0 0 6px var(--amber-glow);
}

.zone-card {
  background: var(--bg-glass);
  border: 1px solid var(--line);
  border-radius: 10px;
  margin-bottom: 18px;
  overflow: hidden;
  transition: border-color 0.22s, background-color 0.22s;
  position: relative;
  backdrop-filter: blur(12px);
  animation: cIn 0.35s ease both;
}
.zone-card.edited {
  border-color: var(--violet-border);
}
.zone-card::before {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  background: var(--violet);
  box-shadow: 0 0 8px var(--violet);
  transition: background-color 0.22s, box-shadow 0.22s;
}
.zone-card.edited::before {
  background: var(--violet-soft);
  box-shadow: 0 0 10px var(--violet-soft);
}
/* Badge "Editado" ganha cor amarela pra destacar */
.zone-card.edited .zone-badge-edited {
  background: var(--amber-bg);
  border-color: var(--amber-border);
  color: var(--amber);
}
/* Partes escritas pelo usuário dentro do contenteditable ficam amarelas */
.zone-text .user-edit {
  color: var(--amber-soft);
  background: rgba(251, 191, 36, 0.06);
  border-radius: 2px;
  padding: 0 1px;
}

.zone-header {
  padding: 16px 20px 14px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.zone-header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}
.zone-number {
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(139, 92, 246, 0.1);
  border: 1px solid var(--violet-border);
  border-radius: 5px;
  font-size: 11px;
  font-weight: 800;
  color: var(--violet);
  letter-spacing: 0;
  font-variant-numeric: tabular-nums;
}
.zone-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.zone-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.2px;
}
.zone-tag {
  font-size: 0.58rem;
  font-weight: 700;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: var(--text-faint);
}
.zone-badge-edited {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--violet-soft);
  padding: 3px 8px;
  border: 1px solid var(--violet-border-soft);
  border-radius: 3px;
  background: rgba(139, 92, 246, 0.06);
}

.zone-context {
  padding: 10px 20px;
  background: rgba(0,0,0,0.25);
  font-size: 11px;
  color: var(--text-ghost);
  line-height: 1.55;
  border-bottom: 1px solid var(--line-dim);
  font-style: italic;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.zone-context .ctx-label {
  font-size: 0.54rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-faint);
  font-style: normal;
  flex-shrink: 0;
  margin-top: 2px;
}
.zone-context .ctx-body { flex: 1; }

.zone-editor {
  padding: 18px 20px;
}
.zone-text {
  width: 100%;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.7;
  letter-spacing: -0.1px;
  min-height: 60px;
  outline: none;
  font-weight: 400;
  white-space: pre-wrap;
  word-wrap: break-word;
  cursor: text;
}
.zone-text:empty::before {
  content: attr(data-placeholder);
  color: var(--text-ghost);
}
.zone-text.generating {
  color: var(--violet-soft);
  font-style: italic;
  opacity: 0.5;
}
.zone-text::selection { background: var(--violet-border); color: var(--text); }
.zone-text .user-edit::selection { background: rgba(251, 191, 36, 0.35); }

.zone-actions {
  padding: 10px 20px;
  border-top: 1px solid var(--line);

<script>
  // Patch runtime pro bug histórico "Cannot set property namespaceURI" do
  // docxtemplater-image-module-free em browsers modernos.
  // Alguns browsers têm Element.prototype.namespaceURI como getter-only e a lib
  // tenta atribuir valor diretamente. Interceptamos a criação de elements pra
  // retornar objetos onde namespaceURI é gravável.
  //
  // Baseado em https://github.com/evilc0des/docxtemplater-image-module-free/issues/1
  (function() {
    if (typeof window === 'undefined') return;
    // Sobrescreve o getter/setter de namespaceURI pra permitir escrita
    try {
      const proto = Element.prototype;
      const desc = Object.getOwnPropertyDescriptor(proto, 'namespaceURI');
      if (desc && desc.get && !desc.set) {
        // Remove o descritor só-leitura; instala um que aceita escrita.
        // Não podemos redefinir o prototype, mas podemos usar uma flag interna.
        Object.defineProperty(proto, 'namespaceURI', {
          get: function() { return this.__customNsURI || desc.get.call(this); },
          set: function(v) { this.__customNsURI = v; },
          configurable: true,
        });
      }
    } catch (e) {
      console.warn('Não foi possível aplicar patch de namespaceURI:', e);
    }
  })();
</script>

    zonas_ia: [
      { tag: 'ia_contexto_conta_salarial', nome: 'Contexto da conta salarial', contexto_antes: 'A parte autora {cliente_nome_completo}, {cliente_nacionalidade}, {cliente_estado_civil}, {cliente_profissao}, portador do RG nº {cliente_rg} {cliente_orgao_expedidor} e do CPF nº {cliente_cpf}, residente na {cliente_endereco_completo}, é correntista do Banco Requerido (Agência {caso_numero_agencia}, Conta Corrente nº {caso_numero_conta}), conta esta de natureza salarial, utilizada para a gestão de sua subsistência e de sua família, dada a sua condição financeira.', contexto_depois: 'Ocorre que, ao analisar seus extratos bancários de forma mais detida, a parte Requerente foi surpreendida com uma série de subtrações patrimoniais reiteradas e abusivas, operadas sob rubricas distintas, mas com o mesmo cenário de ilegalidade: ausência de autorização expressa, indícios de contratação fraudulenta e total ausência de transparência por parte do Banco Réu.' },
      { tag: 'ia_expropriacao_silenciosa', nome: 'Expropriação silenciosa', contexto_antes: 'Ressalte-se que os extratos sequer trazem o discriminação concreta dos contratos que supostamente se referem, demonstrando a absoluta falta de transparência do Banco Réu. Não há especificação adequada sobre a natureza jurídica de cada cobrança, a taxa de juros aplicada, o valor total financiado, a data de vencimento de cada obrigação ou o prazo contratual. É fundamental destacar que a parte Requerente...', contexto_depois: 'O Banco Réu, ao agir de forma arbitrária e omitir informações essenciais, violou o dever de transparência e a boa-fé objetiva, previstos nos arts. 4º e 6º, III, do Código de Defesa do Consumidor, bem como o princípio da proteção da confiança legítima.' },
      { tag: 'ia_frase_minimo_existencial', nome: 'Mínimo existencial', contexto_antes: 'Da proteção ao consumidor superendividado — Lei 14.181/2021. A Lei nº 14.181/2021, que atualizou o Código de Defesa do Consumidor para dispor sobre a prevenção e o tratamento do superendividamento, representa marco civilizatório fundamental na proteção dos consumidores em situação de vulnerabilidade financeira.', contexto_depois: 'DO DANO MORAL "IN RE IPSA"' },
      { tag: 'ia_dano_moral_angustia', nome: 'Dano moral · Angústia', contexto_antes: 'É preciso superar a equivocada tese do "mero aborrecimento", que tem servido de fundamento para a improcedência de inúmeras ações de consumidores lesados. Como ensina o filósofo Jürgen Habermas, "a dignidade humana não admite graduações". Não se pode banalizar as violações aos direitos fundamentais sob o argumento de que são "pequenas" ou "corriqueiras". Cada violação, por menor que pareça, representa uma fissura no tecido social e um retrocesso civilizatório.', contexto_depois: '(próximo parágrafo será o ia_dano_moral_dignidade — continuação do tripé de dano moral)' },
      { tag: 'ia_dano_moral_dignidade', nome: 'Dano moral · Dignidade financeira', contexto_antes: '(parágrafo anterior ia_dano_moral_angustia — você acabou de descrever a angústia psíquica)', contexto_depois: 'A parte autora teve ainda que despender tempo e energia tentando resolver a situação junto ao banco, comparecendo a agências, acionando canais de atendimento, sem obter solução. Esse tempo poderia ter sido empregado em atividades produtivas ou de lazer, configurando o que a doutrina denomina "desvio produtivo do consumidor".' },
      { tag: 'ia_dano_moral_impotencia', nome: 'Dano moral · Impotência', contexto_antes: '(parágrafo anterior ia_dano_moral_dignidade — argumentação principiológica já foi feita) A parte autora teve ainda que despender tempo e energia tentando resolver a situação junto ao banco, comparecendo a agências, acionando canais de atendimento, sem obter solução. Esse tempo poderia ter sido empregado em atividades produtivas ou de lazer, configurando o que a doutrina denomina "desvio produtivo do consumidor".', contexto_depois: 'Do dano existencial. A doutrina contemporânea tem reconhecido uma nova categoria de dano imaterial, denominada dano existencial, que se caracteriza pela privação do direito de desenvolvimento pessoal e social.' },

/* =========================================================================
   NAVEGAÇÃO
   ========================================================================= */
function navegarPara(tela) {
  state.tela = tela;
  document.getElementById('stepper').classList.toggle('hidden', tela === 'lobby' || tela === 'done');
  atualizarStepper(tela);
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

function atualizarStepper(tela) {
  const mapa = { pacote1: 1, pacote2: 2, pacote3: 3, preview: 4, gerando: 4 };
  const step = mapa[tela] || 0;
  document.querySelectorAll('.step-dot').forEach((dot, i) => {
    dot.classList.remove('active', 'done');
    if (i + 1 < step) dot.classList.add('done');
    if (i + 1 === step) dot.classList.add('active');
  });
}

function render() {
  const view = document.getElementById('view');
  switch (state.tela) {
    case 'lobby': renderLobby(view); break;
    case 'pacote1': renderPacote1(view); break;
    case 'pacote2': renderPacote2(view); break;
    case 'pacote3': renderPacote3(view); break;
    case 'preview': renderPreview(view); break;
    case 'gerando': /* renderizado em gerar */ break;
    case 'done': renderDone(view); break;
  }
}

/* =========================================================================
   LOBBY
   ========================================================================= */
function renderLobby(view) {
  const ativos = PRODUTOS.filter(p => p.ativo).length;
  const locked = PRODUTOS.filter(p => !p.ativo).length;
  const busca = (state.buscaLobby || '').trim();

  // Filtrar por busca (nome, réu, rubricas, categoria, sublabel)
  const filtrados = filtrarProdutos(PRODUTOS, busca);

  // Agrupar por categoria
  const porCategoria = {};
  filtrados.forEach(p => {
    const cat = p.categoria || 'Outros';
    if (!porCategoria[cat]) porCategoria[cat] = [];
    porCategoria[cat].push(p);
  });

  view.innerHTML = `
    <div class="lobby">
      <div class="lobby-hero">
        <div class="lobby-hero-left">
          <h1>Selecione o <span class="accent">produto</span> jurídico.</h1>
        </div>
        <div class="lobby-hero-right">
          <div class="stat-label">Catálogo</div>
          <div class="stat-value"><span class="tabular">${ativos}</span> ativos · <span class="tabular">${locked}</span> em validação</div>
        </div>
      </div>

      <div class="search-bar">
        <svg class="search-bar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
        <input
          id="buscaLobby"
          type="text"
          class="search-bar-input"
          placeholder="Buscar ação..."
          value="${escapeHtml(busca)}"
          autocomplete="off"
        >
        ${busca
          ? `<button class="search-bar-clear" onclick="limparBusca()" title="Limpar">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>`
          : ''
        }
      </div>

      ${filtrados.length === 0
        ? `<div class="search-empty">
            <strong>Nenhum produto encontrado</strong>
            para <em>"${escapeHtml(busca)}"</em>. Tente outro termo ou <button class="btn-link" style="padding:0;display:inline" onclick="limparBusca()">limpe a busca</button>.
          </div>`
        : Object.entries(porCategoria).map(([categoria, produtos]) => `
            <div class="shelf">
              <div class="shelf-header">
                <div class="shelf-title">${categoria}</div>
                <div class="shelf-divider"></div>
                <div class="shelf-count">${produtos.length} ${produtos.length === 1 ? 'produto' : 'produtos'}${busca ? ' encontrados' : ''}</div>
              </div>
              <div class="shelf-scroll-wrap">
                <div class="shelf-grid">
                  ${produtos.map((p, i) => renderProductCard(p, i)).join('')}
                </div>
              </div>
            </div>
          `).join('')
      }
    </div>
  `;

  // Hook de input e atalho ⌘K
  const input = document.getElementById('buscaLobby');
  if (input) {
    // Se já tem busca ativa, manter foco na digitação
    if (busca) {
      input.focus();
      input.setSelectionRange(input.value.length, input.value.length);
    }
    input.addEventListener('input', debounce(e => {
      state.buscaLobby = e.target.value;
      render();
    }, 150));
    input.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        state.buscaLobby = '';
        render();
      }
    });
  }
}

function filtrarProdutos(produtos, busca) {
  if (!busca) return produtos;
  const termo = busca.toLowerCase().trim();
  return produtos.filter(p => {
    const campos = [
      p.nome, p.sublabel, p.categoria, p.reu,
      ...(p.rubricas || []),
    ].filter(Boolean).join(' ').toLowerCase();
    return campos.includes(termo);
  });
}

function limparBusca() {
  state.buscaLobby = '';

}

function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function debounce(fn, ms) {
  let timer;
  return function(...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), ms);
  };
}

async function processarSelfie(file) {
  if (file.size > 5 * 1024 * 1024) {
    alert('Imagem muito grande (máx 5 MB).');
    return;
  }
  const base64 = await fileParaBase64(file);
  state.anexos.selfie = {
    base64,          // data:image/jpeg;base64,... (completo, pronto pra src)
    mimeType: file.type,
    nome: file.name,
    tamanho: file.size,
  };
  render();
}

function fileParaBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

async function processarTabelaXlsx(file) {
  if (typeof XLSX === 'undefined') {
    alert('Biblioteca XLSX não carregou. Recarregue a página.');
    return;
  }
  try {
    const buffer = await file.arrayBuffer();
    const workbook = XLSX.read(buffer, { type: 'array', cellDates: true, cellStyles: true });
    const primeiraAba = workbook.SheetNames[0];
    if (!primeiraAba) {
      alert('Planilha sem abas.');
      return;
    }
    const ws = workbook.Sheets[primeiraAba];

    // Array de arrays bruto (todas as linhas, incluindo subtítulos mesclados)
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, dateNF: 'dd/mm/yyyy', defval: '' });
    if (rows.length < 2) {
      alert('Planilha parece vazia.');
      return;
    }

    // Lista de células mescladas (pra detectar subtítulos que ocupam várias colunas)
    const merges = ws['!merges'] || [];
    const linhasMescladas = new Set();
    for (const m of merges) {
      // Linha mesclada horizontalmente (começa em col 0, termina >= col 2, mesma linha)
      if (m.s.c === 0 && m.e.c >= 2 && m.s.r === m.e.r) {
        linhasMescladas.add(m.s.r);
      }
    }

    // Classifica cada linha da planilha em: cabecalho, subtitulo, dado, valor_total, valor_dobro
    // Preservamos TODAS as linhas pra que a tabela no .docx seja fiel ao XLSX
    const linhasClassificadas = [];
    const linhasDataParaCalcular = []; // só as de dado, pra computar min/max de data

    for (let r = 0; r < rows.length; r++) {
      const row = rows[r];
      if (row.every(v => v === '' || v == null)) continue; // pula linhas totalmente vazias

      const primeiraCel = (row[0] || '').toString().trim();
      const primeiraCelUp = primeiraCel.toUpperCase();

      // Linhas especiais de total
      if (primeiraCelUp === 'VALOR TOTAL') {
        linhasClassificadas.push({ tipo: 'valor_total', valor: parseValor(row[row.length - 1]) });
        continue;
      }
      if (primeiraCelUp === 'VALOR EM DOBRO' || primeiraCelUp === 'VALOR DOBRO') {
        linhasClassificadas.push({ tipo: 'valor_dobro', valor: parseValor(row[row.length - 1]) });
        continue;
      }

      // Linha de cabeçalho (primeira "Data" + segunda "Descrição")
      if (primeiraCel === 'Data' && (row[1] || '').toString().trim() === 'Descrição') {
        linhasClassificadas.push({ tipo: 'cabecalho' });
        continue;
      }

      // Subtítulo (célula mesclada ocupando horizontalmente a linha)
      if (linhasMescladas.has(r)) {
        linhasClassificadas.push({ tipo: 'subtitulo', texto: primeiraCel });
        continue;
      }

      // Linha de dados (data | descrição | operação | valor)
      const dataStr = (row[0] || '').toString().trim();
      const dataObj = parseDataBR(dataStr);
      const valor = parseValor(row[3]);

      if (dataObj && !isNaN(valor)) {
        const linhaDado = {
          tipo: 'dado',
          data: dataStr,
          dataObj,
          descricao: (row[1] || '').toString().trim(),
          operacao: (row[2] || '').toString().trim(),
          valor,
          valor_formatado: formatarValorBR(valor),
        };
        linhasClassificadas.push(linhaDado);
        linhasDataParaCalcular.push(linhaDado);
      }
      // Se não é nenhum dos tipos reconhecidos, ignora silenciosamente
    }

    if (linhasDataParaCalcular.length === 0) {
      alert('Nenhuma linha de desconto válida encontrada. Confira se as datas estão como DD/MM/AAAA.');
      return;
    }

    // Extrai valor total e dobro (se não vieram como linhas, calcula)
    let valorTotal = null, valorDobro = null;
    for (const l of linhasClassificadas) {
      if (l.tipo === 'valor_total' && isFinite(l.valor)) valorTotal = l.valor;
      if (l.tipo === 'valor_dobro' && isFinite(l.valor)) valorDobro = l.valor;
    }
    if (valorTotal == null) {
      valorTotal = linhasDataParaCalcular.reduce((s, l) => s + l.valor, 0);
      // Adiciona linha de total virtual se não existia
      linhasClassificadas.push({ tipo: 'valor_total', valor: valorTotal });
    }
    if (valorDobro == null) {
      valorDobro = valorTotal * 2;
      linhasClassificadas.push({ tipo: 'valor_dobro', valor: valorDobro });
    }

    // Min/max de data (usa só linhas de dados reais)
    const ordenadas = [...linhasDataParaCalcular].sort((a, b) => a.dataObj - b.dataObj);

    state.anexos.tabelaXlsx = {
      nomeArquivo: file.name,
      linhasClassificadas,        // TODAS as linhas fiéis ao XLSX — usado pra montar tabela no .docx
      linhasDataApenas: linhasDataParaCalcular, // só as de dado — usado pra min/max e contagens
      valorTotal,
      valorDobro,
    };

    // Autopreencher os campos do Pacote 3 (datas e valor total)
    autopreencherValoresDaTabela();

    // Autodetectar rubricas presentes na planilha e sobrescrever state.rubricas
    // (planilha é fonte da verdade também pras rubricas aplicáveis)
    autodetectarRubricas();

    render();
  } catch (err) {
    console.error('Erro ao processar XLSX:', err);
    alert('Falha ao ler a planilha: ' + err.message);
  }
}

/**
 * Detecta quais rubricas estão presentes na planilha anexada, olhando a coluna
 * `Descrição` (e, como reforço, subtítulos mesclados). Normaliza descrições
 * comuns e marca as flags em state.rubricas.
 *
 * Estratégia conservadora: marca TRUE quando detecta, FALSE quando não detecta.
 * O usuário pode sempre ajustar manualmente depois via checkbox no Pacote 3.
 */
function autodetectarRubricas() {
  const tab = state.anexos.tabelaXlsx;
  if (!tab || !Array.isArray(tab.linhasClassificadas)) return;

  const detectadas = { cartao: false, parcela: false, bx: false };

  // Função que classifica uma string de descrição (ou subtítulo) em 1 das 3 rubricas
  function classificar(texto) {
    const t = String(texto || '').toUpperCase().trim();
    if (!t) return null;
    // BX.ANT.FINANC / BX ANT FINANC / "Baixa Antecipada" / antecipação financeira
    if (t.includes('BX.ANT') || t.includes('BX ANT') ||
        t.includes('ANTECIPA') || t.includes('BAIXA ANT')) {
      return 'bx';
    }
    // PARCELA CRÉDITO / CREDITO PESSOAL
    if (t.includes('PARCELA') && (t.includes('CRED') || t.includes('CRÉD'))) {
      return 'parcela';
    }
    if (t.includes('CRÉDITO PESSOAL') || t.includes('CREDITO PESSOAL')) {
      return 'parcela';
    }
    // GASTOS CARTÃO / CARTAO DE CREDITO
    if (t.includes('GASTOS') && (t.includes('CART') || t.includes('CARTÃO'))) {
      return 'cartao';
    }
    if (t.includes('CARTÃO DE CRÉDITO') || t.includes('CARTAO DE CREDITO')) {
      return 'cartao';
    }
    return null;
  }

  for (const l of tab.linhasClassificadas) {
    if (l.tipo === 'dado') {
      const r = classificar(l.descricao);
      if (r) detectadas[r] = true;
    } else if (l.tipo === 'subtitulo') {
      const r = classificar(l.texto);
      if (r) detectadas[r] = true;
    }
  }

  // Sobrescreve — planilha é fonte da verdade
  state.rubricas = detectadas;
}

/**
 * Converte valor de célula de XLSX pra Number, aceitando múltiplos formatos:
 * - "1.470,62" (BR com milhar)
 * - "1,470.62" (EN com milhar) — caso comum quando o Excel reconhece a célula como number
 * - "1470,62" (BR sem milhar)
 * - "1470.62" (EN sem milhar)
 * - 1470.62 (número nativo)
 * - "R$ 1.470,62" e variantes
 */
function parseValor(v) {
  if (v == null || v === '') return NaN;
  if (typeof v === 'number') return v;
  const s = String(v).replace(/R\$\s*/gi, '').trim();

  // BR com separador de milhar: "1.470,62"
  if (/^\d{1,3}(\.\d{3})+,\d+$/.test(s)) {
    return parseFloat(s.replace(/\./g, '').replace(',', '.'));
  }
  // BR sem milhar: "1470,62"
  if (/^\d+,\d+$/.test(s)) {
    return parseFloat(s.replace(',', '.'));
  }
  // EN com milhar: "1,470.62"
  if (/^\d{1,3}(,\d{3})+\.\d+$/.test(s)) {
    return parseFloat(s.replace(/,/g, ''));
  }
  // EN sem milhar ou inteiro: "1470.62", "1470"
  if (/^\d+(\.\d+)?$/.test(s)) {
    return parseFloat(s);
  }
  // Fallback: tenta interpretar removendo vírgulas
  return parseFloat(s.replace(/,/g, ''));
}

/**
 * Formata Number em padrão brasileiro (1.470,62) com exatamente 2 casas decimais.
 */
function formatarValorBR(n) {
  if (!isFinite(n)) return '';
  return n.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

/**
 * Converte string "DD/MM/AAAA" em Date. Retorna null se não bater o formato.
 */
function parseDataBR(s) {
  const m = /^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/.exec(String(s || '').trim());
  if (!m) return null;
  let [, dd, mm, yy] = m;
  if (yy.length === 2) yy = '20' + yy;
  const d = new Date(parseInt(yy), parseInt(mm) - 1, parseInt(dd));
  return isNaN(d.getTime()) ? null : d;
}

/**
 * Formata Date em string "mês/ano" em português (ex.: "janeiro/2025").
 */
function formatarMesAnoExtenso(d) {
  if (!d) return '';
  const meses = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  return `${meses[d.getMonth()]}/${d.getFullYear()}`;
}

/**
 * Preenche valor_total_descontos, data_inicio_descontos e data_fim_descontos
 * a partir da planilha anexada. A planilha SEMPRE vence: qualquer valor
 * previamente preenchido é sobrescrito, porque a planilha é a fonte
 * de verdade dos descontos indevidos (o banco emitiu ela).
 *
 * Justificativa: o usuário trocar de planilha significa trocar de caso.
 * Manter valores antigos seria perigoso e causaria incoerência.
 */
function autopreencherValoresDaTabela() {
  const tab = state.anexos.tabelaXlsx;
  if (!tab || typeof tab !== 'object') return;

  const linhasDado = tab.linhasDataApenas || tab.linhas || [];
  if (linhasDado.length === 0) return;

  // Ordena cronologicamente pra achar a data mais antiga e a mais recente
  const ordenadas = [...linhasDado].sort((a, b) => a.dataObj - b.dataObj);
  const dataInicioBR = ordenadas[0].data;                         // mais antiga
  const dataFimBR    = ordenadas[ordenadas.length - 1].data;      // mais recente

  // SOBRESCREVE sempre — a planilha é a fonte da verdade
  state.dadosPacote3.data_inicio_descontos = dataInicioBR;
  state.dadosPacote3.data_fim_descontos = dataFimBR;
  state.dadosPacote3.valor_total_descontos = formatarValorBR(tab.valorTotal);

  // Metadados pra comparação de divergência (caso o usuário edite depois)
  state.dadosPacote3._valor_dobro_da_tabela = tab.valorDobro;
  state.dadosPacote3._valor_total_da_tabela = tab.valorTotal;
  state.dadosPacote3._data_inicio_da_tabela = dataInicioBR;
  state.dadosPacote3._data_fim_da_tabela = dataFimBR;
}

function pularTabelaXlsx() {
  state.anexos.tabelaXlsx = 'pulado';
  render();
}

function desfazerPularTabelaXlsx() {

function removerTabelaXlsx() {

/**
 * Checa se há divergência entre o valor digitado manualmente pelo usuário
 * e o valor calculado pela tabela XLSX. Retorna objeto com detalhes ou null.
 */
function checarDivergenciaTabela() {
  const tab = state.anexos.tabelaXlsx;
  if (!tab || typeof tab !== 'object') return null;

  const alertas = [];

  // Compara valor_total_descontos
  const valManualTotal = parseValor(state.dadosPacote3.valor_total_descontos || '0');
  if (!isNaN(valManualTotal) && valManualTotal > 0) {
    const diff = Math.abs(valManualTotal - tab.valorTotal);
    if (diff > 0.01) {  // tolerância de 1 centavo pra evitar falso positivo de arredondamento
      alertas.push({
        campo: 'valor_total_descontos',
        rotulo: 'Valor total dos descontos',
        manual: valManualTotal,
        planilha: tab.valorTotal,
      });
    }
  }

  return alertas.length > 0 ? alertas : null;
}

function renderBlocoDivergencia(divergencias) {
  const itens = divergencias.map(d => {
    const manual = d.manual.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const planilha = d.planilha.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    return `
      <li class="diverg-item">
        <strong>${d.rotulo}:</strong>
        você digitou <span class="diverg-manual">R$ ${manual}</span>,
        mas a planilha indica <span class="diverg-planilha">R$ ${planilha}</span>
        <button class="diverg-aplicar" onclick="aplicarValorDaPlanilha('${d.campo}')">Usar valor da planilha</button>
      </li>
    `;
  }).join('');

  return `
    <div class="diverg-alert">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="diverg-icon">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <div class="diverg-body">
        <div class="diverg-title">Valor divergente da planilha</div>
        <ul class="diverg-lista">${itens}</ul>
      </div>
    </div>
  `;
}

function aplicarValorDaPlanilha(campo) {
  const tab = state.anexos.tabelaXlsx;
  if (!tab || typeof tab !== 'object') return;
  const fmt = (v) => v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  if (campo === 'valor_total_descontos') {
    state.dadosPacote3.valor_total_descontos = fmt(tab.valorTotal);
  }
  render();
}

function formatarMoeda(v) {
  return v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

/* =========================================================================
   RENDER HELPERS
   ========================================================================= */
function renderCampo(campo, dados, pacote, obrigatorio) {
  const notInformed = dados[campo.key] === null;
  return `
    <div class="field ${campo.wide ? 'wide' : ''} ${notInformed ? 'not-informed' : ''}" data-key="${campo.key}">
      <div class="field-label">
        <span class="field-label-text">${campo.label}${obrigatorio ? '<span class="req">*</span>' : ''}</span>
        <div class="field-controls">
          ${renderShieldBtn(campo.key)}
          ${!obrigatorio ? `
            <button class="no-info-btn ${notInformed ? 'active' : ''}" onclick="toggleNaoInformado('${campo.key}', '${pacote}')">
              ${notInformed ? '✓ Pulado' : 'Pular'}
            </button>
          ` : ''}
        </div>
      </div>
      ${renderInput(campo, dados, pacote)}
    </div>
  `;
}

function renderCampoObrigatorio(campo, dados, pacote) {
  return `
    <div class="field ${campo.wide ? 'wide' : ''}" data-key="${campo.key}">
      <div class="field-label">
        <span class="field-label-text">${campo.label}<span class="req">*</span></span>
        <div class="field-controls">${renderShieldBtn(campo.key)}</div>
      </div>
      ${renderInput(campo, dados, pacote)}
    </div>
  `;
}

function renderInput(campo, dados, pacote) {
  const val = dados[campo.key] ?? '';
  const disabled = val === null ? 'disabled' : '';
  if (campo.tipo === 'select') {
    // Normaliza: aceita string simples OU {value, label}
    const opcoes = campo.opcoes.map(o =>
      typeof o === 'string' ? { value: o, label: o || '— selecione —' } : o
    );
    // Garante que o state reflete o valor atual do select (mesmo se usuário não mudou)
    // Isso evita o bug do "avançar" não habilitar quando o campo tem valor default visível
    if (val === '' && opcoes.length > 0) {
      const primeiraOpcaoValida = opcoes.find(o => o.value !== '');
      if (primeiraOpcaoValida) {
        dados[campo.key] = primeiraOpcaoValida.value;
      }
    }
    const valAtual = dados[campo.key] ?? '';
    return `
      <select data-campo="${campo.key}" data-pacote="${pacote}" ${disabled}>
        ${opcoes.map(o => `<option value="${o.value}" ${valAtual === o.value ? 'selected' : ''}>${o.label}</option>`).join('')}
      </select>
    `;
  }
  if (campo.tipo === 'textarea') {
    return `<textarea data-campo="${campo.key}" data-pacote="${pacote}" ${disabled} placeholder="${campo.placeholder || ''}">${val === null ? '' : val}</textarea>`;
  }
  if (campo.tipo === 'date_br') {
    return `<input type="text" inputmode="numeric" maxlength="10" data-campo="${campo.key}" data-pacote="${pacote}" data-mask="date" value="${val === null ? '' : val}" placeholder="${campo.placeholder || 'DD/MM/AAAA'}" ${disabled}>`;
  }
  return `<input type="${campo.tipo}" data-campo="${campo.key}" data-pacote="${pacote}" value="${val === null ? '' : val}" placeholder="${campo.placeholder || ''}" ${disabled}>`;
}

function renderShieldBtn(campo) {
  const vai = state.seguranca[campo];
  const cls = vai ? 'open' : 'locked';
  const icon = vai
    ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 2L3 7v6c0 5 3.5 9.5 9 10 5.5-.5 9-5 9-10V7l-9-5z"/></svg>`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 2L3 7v6c0 5 3.5 9.5 9 10 5.5-.5 9-5 9-10V7l-9-5z"/><path d="M9 12l2 2 4-4" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const title = vai ? 'Liberado para IA — clique para bloquear' : 'Bloqueado — vai apenas para documento';
  return `<button class="shield-btn ${cls}" data-campo="${campo}" onclick="toggleSeguranca('${campo}')" title="${title}">${icon}${vai ? 'IA ON' : 'IA OFF'}</button>`;
}

function toggleSeguranca(campo) {
  state.seguranca[campo] = !state.seguranca[campo];
  // Atualiza APENAS o botão desse campo — sem re-renderizar a tela inteira
  const vai = state.seguranca[campo];
  document.querySelectorAll(`.shield-btn[data-campo="${campo}"]`).forEach(btn => {
    btn.classList.toggle('open', vai);
    btn.classList.toggle('locked', !vai);
    btn.setAttribute('title', vai
      ? 'Liberado para IA — clique para bloquear'
      : 'Bloqueado — vai apenas para documento');
    // Atualiza o rótulo textual (IA ON/OFF) sem mexer no SVG
    const textNode = btn.lastChild;
    if (textNode && textNode.nodeType === 3) {
      textNode.nodeValue = vai ? 'IA ON' : 'IA OFF';
    } else {
      // Fallback caso a estrutura do nó tenha mudado
      btn.innerHTML = btn.innerHTML.replace(/IA (ON|OFF)\s*$/, vai ? 'IA ON' : 'IA OFF');
    }
    // Pulso visual rapidinho, contido no próprio botão
    btn.classList.remove('flash');
    // força reflow pra reiniciar a animação
    void btn.offsetWidth;
    btn.classList.add('flash');
    setTimeout(() => btn.classList.remove('flash'), 500);
  });
}

function toggleNaoInformado(key, pacote) {
  const dados = pacote === 'pacote2' ? state.dadosPacote2 : state.dadosPacote3;
  if (dados[key] === null) dados[key] = '';
  else dados[key] = null;
  render();
}

function aplicarMascaraData(valor) {
  // Remove tudo que não é dígito
  const num = valor.replace(/\D/g, '').slice(0, 8);
  if (num.length <= 2) return num;
  if (num.length <= 4) return num.slice(0, 2) + '/' + num.slice(2);
  return num.slice(0, 2) + '/' + num.slice(2, 4) + '/' + num.slice(4);
}

function bindFormInputs(pacote) {
  document.querySelectorAll(`[data-pacote="${pacote}"]`).forEach(el => {
    const handler = e => {
      const campo = e.target.dataset.campo;
      const dados = pacote === 'pacote1' ? state.dadosPacote1 :
                    pacote === 'pacote2' ? state.dadosPacote2 : state.dadosPacote3;
      // Aplica máscara se for campo de data
      if (e.target.dataset.mask === 'date') {
        const posCursor = e.target.selectionStart;
        const antes = e.target.value;
        const mascarado = aplicarMascaraData(antes);
        if (antes !== mascarado) {
          e.target.value = mascarado;
          // Mantém o cursor perto de onde estava (+1 se adicionou barra)
          const delta = mascarado.length - antes.length;
          const novoPos = Math.max(0, posCursor + delta);
          try { e.target.setSelectionRange(novoPos, novoPos); } catch {}
        }
        dados[campo] = mascarado;
      } else {
        dados[campo] = e.target.value;
      }
      if (pacote === 'pacote1') atualizarBtnAvancar1();
      if (pacote === 'pacote3') {
        const calcPanel = document.getElementById('calcPanel');
        if (calcPanel) calcPanel.innerHTML = renderCalc();
      }
    };
    el.addEventListener('input', handler);
    if (el.tagName === 'SELECT') el.addEventListener('change', handler);
  });
}

function atualizarBtnAvancar1() {
  const btn = document.getElementById('btnAvancar1');
  if (!btn) return;
  const obrigatorios = ['nome_completo','nacionalidade','estado_civil','profissao','rg','orgao_expedidor','cpf','endereco_completo'];
  const preenchidos = obrigatorios.every(k => (state.dadosPacote1[k] || '').toString().trim().length > 0);
  // Selfie precisa estar decidida: anexada OU explicitamente pulada
  const selfieDecidida = state.anexos.selfie !== null;
  btn.disabled = !(preenchidos && selfieDecidida);
}

async function gerarTrechos() {
  const obrigatorios = ['numero_agencia','numero_conta','data_inicio_descontos','data_fim_descontos','valor_total_descontos','valor_dano_moral'];
  const faltando = obrigatorios.filter(k => !(state.dadosPacote3[k] || '').toString().trim());
  if (faltando.length) {
    alert('Preencha todos os campos obrigatórios da ação.');
    return;
  }
  // Tabela XLSX precisa estar decidida: anexada OU pulada explicitamente
  if (state.anexos.tabelaXlsx === null) {
    alert('Anexe a tabela de descontos (.xlsx) ou marque "Anexarei depois".');
    return;
  }
  // Pelo menos 1 rubrica precisa estar marcada — sem isso a peça ficaria sem
  // fundamentação específica, o que é um defeito grave da petição.
  const r = state.rubricas || {};
  if (!r.cartao && !r.parcela && !r.bx) {
    alert('Marque ao menos 1 rubrica aplicável à peça (GASTOS CARTÃO, PARCELA CRÉDITO ou BX.ANT.FINANC).');
    return;
  }

  state.tela = 'gerando';
  document.getElementById('stepper').classList.remove('hidden');
  rodarAnimacaoGeracao('trechos');

  try {
    if (state.config.webhookTrechos) {
      const payload = montarPayloadGeracao();
      const resp = await fetch(state.config.webhookTrechos, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (!resp.ok) throw new Error('Webhook retornou ' + resp.status);
      const json = await resp.json();
      state.trechosIA = json.trechos || {};
      state.trechosIAOriginais = { ...state.trechosIA };
    } else {
      await new Promise(r => setTimeout(r, 3000));
      state.trechosIA = gerarTrechosMock();
      state.trechosIAOriginais = { ...state.trechosIA };
    }
    await new Promise(r => setTimeout(r, 500));
    navegarPara('preview');
  } catch (err) {
    alert('Erro ao gerar trechos: ' + err.message);
    navegarPara('pacote3');
  }
}

function montarPayloadGeracao() {
  const dadosParaIA = {};
  const dadosBloqueados = {};
  const todos = { ...state.dadosPacote1, ...state.dadosPacote2, ...state.dadosPacote3 };
  Object.entries(todos).forEach(([k, v]) => {
    if (v === null || v === '') return;
    if (state.seguranca[k]) dadosParaIA[k] = v;
    else dadosBloqueados[k] = v;
  });
  return {
    produto_id: state.produtoSelecionado.id,
    produto_nome: state.produtoSelecionado.nome,
    dados_para_ia: dadosParaIA,
    zonas: state.produtoSelecionado.zonas_ia.map(z => z.tag),
    // Configuração de coexistência entre as zonas: cada zona tem um papel
    // exclusivo, regras do que evitar, e o que veio antes/depois na peça.
    // Serve pra IA entender o contexto global e evitar redundância.
    // Se a zona contém uma instrução "papel_exclusivo", a IA deve seguir ela
    // estritamente e NÃO incluir informações que não sejam daquele papel.
    zonas_config: enriquecerZonasConfigComContextos(montarZonasConfigBradesco()),
    regras_globais: [
      'NUNCA reapresente o cliente por nome completo + biografia em mais de UM trecho — isso já foi feito no início da peça.',
      'A PARTIR DO SEGUNDO TRECHO, use preferencialmente "a parte autora", "a requerente", "ela/ele" em vez de repetir nome completo.',
      'NÃO repita renda, profissão, estado civil e composição familiar em mais de DOIS trechos diferentes.',
      'Cada trecho tem um PAPEL ÚNICO e EXCLUSIVO — foque só nesse papel, deixando os outros aspectos pros outros trechos.',
      'Não faça introdução biográfica em cada trecho — ataque diretamente o papel do trecho.',
      'Mantenha tom jurídico formal, sem rebuscamento desnecessário.',
      'CRÍTICO: o campo "texto_antes" de cada zona mostra EXATAMENTE o que vem no parágrafo imediatamente anterior do template. NÃO REPITA essas informações — dê CONTINUIDADE. Se texto_antes já disse "A parte autora X, brasileiro, pedreiro, residente em Y", NÃO comece o trecho reapresentando X, profissão ou endereço.',
    ],

}

/**
 * Pega o objeto de zonas_config (papel/incluir/evitar/posicao) e adiciona
 * os campos texto_antes e texto_depois lendo do produto selecionado.
 * Isso faz a IA saber exatamente o que o template está dizendo ao redor
 * do trecho que ela vai escrever — evita redundância com o texto fixo.
 */
function enriquecerZonasConfigComContextos(configBase) {
  const zonas = state.produtoSelecionado?.zonas_ia || [];
  const enriquecido = {};
  Object.entries(configBase).forEach(([tag, cfg]) => {
    const zona = zonas.find(z => z.tag === tag);
    enriquecido[tag] = {
      ...cfg,
      texto_antes: zona?.contexto_antes || '',
      texto_depois: zona?.contexto_depois || '',
    };
  });
  return enriquecido;
}

function rodarAnimacaoGeracao(modo) {
  renderGerando(document.getElementById('view'), modo);
  const total = modo === 'trechos' ? 5 : 4;
  const duracaoTotal = modo === 'trechos' ? 3500 : 1800;
  const intervalo = duracaoTotal / total;

  const fill = document.getElementById('genProgressFill');
  const percent = document.getElementById('genPercent');
  const checks = document.querySelectorAll('.gen-check');

  // Começa do zero
  if (fill) fill.style.width = '0%';
  if (percent) percent.textContent = '0%';
  checks.forEach(c => c.classList.remove('active', 'done'));

  // O check ativo é o próximo a ser concluído
  if (checks[0]) checks[0].classList.add('active');

  let i = 0;
  const avancar = () => {
    if (i >= total) return;
    // Finaliza o check atual (estala como done)
    if (checks[i]) {
      checks[i].classList.remove('active');
      checks[i].classList.add('done');
    }
    // Marca o próximo como active (se houver)
    if (checks[i + 1]) checks[i + 1].classList.add('active');
    // Progride a barra em sincronia com o check recém-concluído
    const pct = Math.round(((i + 1) / total) * 100);
    if (fill) fill.style.width = pct + '%';
    if (percent) percent.textContent = pct + '%';
    i++;
    if (i < total) setTimeout(avancar, intervalo);
  };
  // Primeira transição após um pequeno delay (dá tempo do active aparecer)
  setTimeout(avancar, intervalo);

  // Retorna promise que resolve quando a animação realmente termina
  // (último check done + buffer de 200ms pra transição de CSS acabar)
  return new Promise(resolve => {
    setTimeout(resolve, duracaoTotal + 250);
  });
}
